<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNAPSE — Secure Authentication</title>
    <!-- Tailwind CSS v4 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&family=Fira+Code:wght@500&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-brand-bg: #0A0A0A;
            --color-brand-card: #111111;
            --color-brand-text: #F5F5F5;
            --color-brand-red: #D90429;
            --color-brand-red-light: #E63946;
            --color-brand-orange: #C97B3D;
            --color-brand-orange-light: #D08B4E;
            --color-brand-border: #222222;
            
            --font-display: 'Plus Jakarta Sans', sans-serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Fira Code', monospace;
        }
    </style>

    <style>
        :root {
            --accent-color: #C97B3D;
            --accent-color-rgb: 201, 123, 61;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #F5F5F5;
            overflow-x: hidden;
        }
        h1, h2, h3, .brand-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        /* Grid background pattern */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: -30;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        }

        /* Premium glass-card for authentication */
        .auth-card {
            background: rgba(18, 18, 18, 0.72);
            backdrop-filter: blur(25px) saturate(190%);
            -webkit-backdrop-filter: blur(25px) saturate(190%);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                        0 0 40px rgba(201, 123, 61, 0.03);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .auth-card:hover {
            border-color: rgba(201, 123, 61, 0.25);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7), 
                        0 0 50px rgba(201, 123, 61, 0.06);
        }
        
        /* Glowing Ambient Backdrops */
        .glow-bg {
            position: absolute;
            pointer-events: none;
            z-index: -10;
            filter: blur(140px);
            opacity: 0.38;
            transition: opacity 0.8s, transform 0.8s;
        }

        /* Custom input fields matching screenshot */
        .custom-input {
            background-color: #141414;
            border: 1px solid #222222;
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            border-color: rgba(201, 123, 61, 0.5);
            box-shadow: 0 0 12px rgba(201, 123, 61, 0.15);
            background-color: #181818;
        }

        /* ── Admin Login Button ── */
        .btn-admin {
            width: 100%;
            background: linear-gradient(135deg, rgba(139,92,246,0.14), rgba(109,40,217,0.08));
            border: 1px solid rgba(139,92,246,0.32);
            border-radius: 12px; padding: 13px 16px;
            color: #c4b5fd; font-weight: 700; font-size: 13px;
            font-family: 'Inter', sans-serif; cursor: pointer;
            transition: all 0.3s ease;
            display: flex; align-items: center; gap: 12px;
            position: relative; overflow: hidden;
            margin-top: 14px;
        }
        .btn-admin:hover {
            border-color: rgba(139,92,246,0.55);
            color: #ddd6fe;
            box-shadow: 0 0 24px rgba(139,92,246,0.15);
            transform: translateY(-1px);
        }
        .admin-icon-box {
            width: 30px; height: 30px; flex-shrink: 0;
            background: rgba(139,92,246,0.18);
            border: 1px solid rgba(139,92,246,0.28);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-admin-arrow { margin-left: auto; color: #7c3aed; font-size: 11px; }

        /* ── Divider ── */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 18px 0;
        }
        .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
        .divider-text { font-size: 11px; color: #3a3a3a; font-weight: 500; }
    </style>
</head>
<body class="relative min-h-screen bg-brand-bg text-brand-text flex flex-col justify-between selection:bg-brand-orange selection:text-white">

    <!-- Grid Layout Background -->
    <div class="grid-overlay"></div>

    <!-- Navigation Header -->
    <nav class="w-full px-6 py-4 border-b border-brand-border bg-brand-bg/60 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3 group cursor-pointer" onclick="window.location.href='index.html'">
                <span class="text-xl font-bold tracking-wider text-white brand-font">SYNAPSE</span>
            </div>
            <a href="index.html" class="text-xs font-semibold px-4 py-2 border border-brand-border rounded-lg text-neutral-300 hover:text-white hover:border-neutral-500 transition-all">
                <i class="fa-solid fa-house mr-1"></i> Return Home
            </a>
        </div>
    </nav>

    <!-- Authentication Card Container -->
    <main class="flex-1 flex items-center justify-center py-16 px-4 relative z-10">
        <div class="auth-card w-full max-w-[460px] rounded-3xl p-10 flex flex-col gap-6" id="auth-card">
            
            <!-- Branding Header -->
            <div class="text-center flex flex-col items-center gap-2.5">
                <div class="flex items-center justify-center gap-2 text-brand-orange">
                    <i class="fa-solid fa-code text-2xl font-bold"></i>
                    <span class="brand-font font-black text-2xl tracking-wider text-white">Synapse</span>
                </div>
                <h2 class="text-2xl font-bold text-white tracking-tight mt-1" id="auth-title">Welcome Back</h2>
                <p class="text-neutral-400 font-light text-xs" id="auth-subtitle">Enter your details to access your account</p>
            </div>

            <!-- Error message container -->
            <div id="error-box" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 text-xs px-4 py-3 rounded-xl flex items-center gap-2 animate-pulse">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="error-text">An error occurred</span>
            </div>

            <!-- Input Form -->
            <form id="auth-form" onsubmit="handleAuthSubmit(event)" class="flex flex-col gap-4">
                
                <!-- Name Field (Visible in Sign Up mode) -->
                <div class="hidden flex flex-col gap-1.5" id="name-field-group">
                    <label class="text-xs text-neutral-400 font-semibold pl-1">Full Name</label>
                    <div class="relative w-full">
                        <span class="absolute inset-y-0 left-4 flex items-center text-neutral-500 text-sm">
                            <i class="fa-solid fa-user"></i>
                        </span>
                        <input type="text" id="name-input" placeholder="John Doe" 
                            class="w-full custom-input rounded-xl py-3.5 pl-11 pr-4 text-white text-sm outline-none placeholder:text-neutral-600">
                    </div>
                </div>

                <!-- Email Field -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs text-neutral-400 font-semibold pl-1">Email Address</label>
                    <div class="relative w-full">
                        <span class="absolute inset-y-0 left-4 flex items-center text-neutral-500 text-sm">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input type="email" id="email-input" required placeholder="john@example.com" 
                            class="w-full custom-input rounded-xl py-3.5 pl-11 pr-4 text-white text-sm outline-none placeholder:text-neutral-600">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs text-neutral-400 font-semibold pl-1">Password</label>
                    <div class="relative w-full">
                        <span class="absolute inset-y-0 left-4 flex items-center text-neutral-500 text-sm">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="password-input" required placeholder="••••••••" 
                            class="w-full custom-input rounded-xl py-3.5 pl-11 pr-4 text-white text-sm outline-none placeholder:text-neutral-600">
                    </div>
                </div>

                <!-- Options: Remember & Forgot (Hidden in Sign Up mode) -->
                <div class="flex items-center justify-between text-xs mt-1" id="login-options-row">
                    <label class="flex items-center gap-2 text-neutral-400 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded accent-brand-orange border-neutral-700 bg-neutral-900 cursor-pointer">
                        Remember me
                    </label>
                    <a href="#" onclick="alert('Password reset link simulated!')" class="text-brand-orange font-bold hover:text-brand-orange-light transition-colors">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn" 
                    class="w-full bg-gradient-to-r from-brand-orange to-brand-red hover:from-brand-orange-light hover:to-brand-red-light text-white font-bold py-3.5 rounded-xl transition-all shadow-xl shadow-brand-red/10 hover:shadow-brand-red/20 transform hover:-translate-y-0.5 cursor-pointer flex items-center justify-center gap-2 mt-2">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">OR</span>
                <div class="divider-line"></div>
            </div>

            <!-- Admin Login Button -->
            <button onclick="adminQuickLogin()" class="btn-admin">
                <div class="admin-icon-box">
                    <i class="fa-solid fa-shield-halved" style="font-size:13px;color:#a78bfa;"></i>
                </div>
                <div style="text-align:left;">
                    <div style="font-size:13px;font-weight:700;">Admin Login</div>
                    <div style="font-size:10px;color:#7c3aed;font-weight:500;margin-top:1px;">Access DSA Admin Panel</div>
                </div>
                <i class="fa-solid fa-arrow-right btn-admin-arrow"></i>
            </button>

            <!-- Toggle Auth Mode Link -->
            <div class="text-center text-xs text-neutral-400 font-light mt-2">
                <span id="toggle-message">Don't have an account?</span>
                <a href="#" onclick="toggleAuthMode(event)" id="toggle-link" class="text-brand-orange font-bold hover:text-brand-orange-light transition-colors ml-1">Sign Up</a>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-brand-border bg-brand-bg py-6 px-6 relative z-10">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between text-[11px] text-neutral-500 font-light">
            <p>&copy; 2026 Synapse. All rights reserved.</p>
            <div class="flex gap-4 mt-2 sm:mt-0">
                <a href="#" class="hover:text-neutral-300"><i class="fa-brands fa-github text-sm"></i></a>
                <a href="#" class="hover:text-neutral-300"><i class="fa-brands fa-linkedin text-sm"></i></a>
            </div>
        </div>
    </footer>

    <!-- Toast message -->
    <div id="toast" class="fixed bottom-6 right-6 bg-[#111] border border-brand-orange/40 text-brand-orange px-6 py-4 rounded-xl shadow-2xl shadow-brand-orange/10 transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        <i class="fa-solid fa-circle-info"></i>
        <span id="toast-msg" class="text-sm font-semibold">Success!</span>
    </div>

    <!-- Scripting and logic -->
    <script>
        let isSignUpMode = false;
        const backendUrl = (() => {
            const { protocol, hostname } = window.location;
            const isLocal = protocol === 'file:' || hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '[::1]';
            if (isLocal) return 'http://localhost:5000';
            return localStorage.getItem('synapse_backend_url') || 'https://synapse-ai-hackathon.onrender.com';
        })();

        // ── Admin quick login ──
        function adminQuickLogin() {
            if (isSignUpMode) toggleAuthMode(null);
            document.getElementById('email-input').value = 'admin@synapse.ai';
            document.getElementById('password-input').value = 'Admin@123';
            document.getElementById('auth-form').dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
        }

        function toggleAuthMode(e) {
            if (e) e.preventDefault();
            
            isSignUpMode = !isSignUpMode;
            
            const authTitle = document.getElementById("auth-title");
            const authSubtitle = document.getElementById("auth-subtitle");
            const nameFieldGroup = document.getElementById("name-field-group");
            const loginOptionsRow = document.getElementById("login-options-row");
            const submitBtn = document.getElementById("submit-btn");
            const toggleMessage = document.getElementById("toggle-message");
            const toggleLink = document.getElementById("toggle-link");
            const errorBox = document.getElementById("error-box");
            
            errorBox.classList.add("hidden");

            // Toggle classes & content with animations
            if (isSignUpMode) {
                authTitle.textContent = "Create Account";
                authSubtitle.textContent = "Enter your details to create your account";
                nameFieldGroup.classList.remove("hidden");
                loginOptionsRow.classList.add("hidden");
                submitBtn.textContent = "Sign Up";
                toggleMessage.textContent = "Already have an account?";
                toggleLink.textContent = "Sign In";
            } else {
                authTitle.textContent = "Welcome Back";
                authSubtitle.textContent = "Enter your details to access your account";
                nameFieldGroup.classList.add("hidden");
                loginOptionsRow.classList.remove("hidden");
                submitBtn.textContent = "Sign In";
                toggleMessage.textContent = "Don't have an account?";
                toggleLink.textContent = "Sign Up";
            }
        }

        function showToast(msg, color = '#ff7300') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.style.borderColor = color + '88';
            toast.style.color = color;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3500);
        }



        async function handleAuthSubmit(e) {
            e.preventDefault();
            
            const emailInput = document.getElementById("email-input").value.trim();
            const passwordInput = document.getElementById("password-input").value.trim();
            const nameInput = document.getElementById("name-input").value.trim();
            const errorBox = document.getElementById("error-box");
            const errorText = document.getElementById("error-text");
            const submitBtn = document.getElementById("submit-btn");

            errorBox.classList.add("hidden");
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1.5"></i> Loading...';

            const endpoint = isSignUpMode ? "/api/auth/register" : "/api/auth/login";
            const payload = isSignUpMode 
                ? { name: nameInput, email: emailInput, password: passwordInput }
                : { email: emailInput, password: passwordInput };

            try {
                const response = await fetch(`${backendUrl}${endpoint}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (data.success) {
                    showToast(isSignUpMode ? "Account registered successfully!" : "Logged in successfully!", "#10b981");
                    
                    // Save credentials to localStorage
                    localStorage.setItem("synapse_token", data.token);
                    localStorage.setItem("synapse_user", JSON.stringify(data.user));

                    // Delay redirect slightly for UX toast visibility
                    setTimeout(() => {
                        if (data.user && data.user.role === "admin") {
                            window.location.href = "admin.html";
                        } else {
                            const redirectTo = sessionStorage.getItem('synapse_redirect_after_login');
                            sessionStorage.removeItem('synapse_redirect_after_login');
                            window.location.href = redirectTo || 'index.html';
                        }
                    }, 1200);
                } else {
                    errorText.textContent = data.error || "Authentication failed.";
                    errorBox.classList.remove("hidden");
                }
            } catch (err) {
                console.error(err);
                errorText.textContent = "Could not connect to backend server. Make sure it is running.";
                errorBox.classList.remove("hidden");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isSignUpMode ? "Sign Up" : "Sign In";
            }
        }

        // Check if already logged in and redirect to home
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem("synapse_token");
            if (token) {
                window.location.href = "index.html";
            }
        });


    </script>
</body>
</html>

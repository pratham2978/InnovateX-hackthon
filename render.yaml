services:
  - type: web
    name: synapse-ai-hackathon
    runtime: node
    rootDir: backend
    buildCommand: python3 -m venv venv && ./venv/bin/pip install -r ../requirements.txt && npm install --ignore-scripts
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoMaster — Animations Dashboard</title>
    <!-- Tailwind CSS v4 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-brand-bg: #0A0A0A;
            --color-brand-card: #111111;
            --color-brand-text: #F5F5F5;
            --color-brand-red: #D90429;
            --color-brand-red-light: #E63946;
            --color-brand-orange: #C97B3D;
            --color-brand-orange-light: #D08B4E;
            --color-brand-border: #222222;
            
            --font-display: 'Plus Jakarta Sans', sans-serif;
            --font-sans: 'Inter', sans-serif;
        }
    </style>

    <style>
        :root {
            --accent-color: #C97B3D; /* Brand Orange */
            --accent-color-rgb: 201, 123, 61;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #F5F5F5;
            overflow-x: hidden;
        }
        h1, h2, h3, .brand-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        /* Grid background pattern */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: -30;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        }

        /* Glassmorphism cards matching AlgoMaster styling */
        .algo-card {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .algo-card:hover {
            border-color: rgba(201, 123, 61, 0.4);
            box-shadow: 0 0 30px rgba(201, 123, 61, 0.1);
            transform: translateY(-4px);
        }

        /* Floating particles */
        .glow-bg {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            filter: blur(130px);
            opacity: 0.35;
            transition: opacity 0.8s, transform 0.8s;
        }
    </style>
</head>
<body class="relative min-h-screen bg-brand-bg text-brand-text selection:bg-brand-orange selection:text-white" id="app-body">

    <!-- Grid Layout Background -->
    <div class="grid-overlay"></div>

    <!-- Interactive Neural Network Background Canvas -->
    <canvas id="canvas-synapse" class="fixed inset-0 w-full h-full -z-20 pointer-events-none opacity-20"></canvas>

    <!-- Ambient Glow Element -->
    <div id="glow-1" class="glow-bg w-[600px] h-[600px] top-[15%] left-[25%] bg-brand-orange/15"></div>

    <!-- Navigation Header -->
    <nav class="sticky top-0 z-50 w-full px-6 py-4 border-b border-brand-border bg-brand-bg/60 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3 group cursor-pointer" onclick="window.location.href='index.html'">
                <span class="text-xl font-bold tracking-wider text-white brand-font">SYNAPSE</span>
            </div>
            
            <div class="hidden md:flex items-center gap-8 text-sm font-medium text-neutral-400">
                <a href="index.html" class="hover:text-white transition-colors">Home</a>
                <a href="features.html" class="hover:text-white transition-colors">Features</a>
                <a href="global-ranking.html" class="hover:text-white transition-colors">Global Ranking</a>
            </div>

            <div class="flex items-center gap-4" id="nav-auth-container">
                <button onclick="window.location.href='auth.html'" class="text-xs font-semibold px-4 py-2 border border-brand-border rounded-lg text-neutral-300 hover:text-white hover:border-neutral-500 transition-all cursor-pointer">
                    Log In
                </button>
                <a href="dsa.html" class="text-xs font-semibold px-4 py-2 border border-brand-border rounded-lg text-neutral-300 hover:text-white hover:border-neutral-500 transition-all">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Back to DSA Menu
                </a>
            </div>
        </div>
    </nav>
    <!-- Auth Guard: redirect to login if not authenticated -->
    <script src="js/auth-guard.js"></script>


    <!-- Main Container -->
    <main class="py-16 px-6 max-w-6xl mx-auto relative z-10">
        
        <!-- Header Text -->
        <div class="mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight leading-tight">
                AlgoMaster DSA Animations
            </h1>
            <p class="text-neutral-400 font-light text-sm md:text-base mt-2">
                Interactive visualizations for data structures and algorithms. Pick an algorithm to launch sandbox.
            </p>
        </div>

        <!-- Filter Controls Bar -->
        <div class="flex flex-col md:flex-row items-stretch md:items-center gap-4 mb-10 pb-6 border-b border-brand-border/60">
            <!-- Search bar -->
            <div class="flex-grow relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-neutral-500 text-xs"></i>
                <input type="text" id="search-input" placeholder="Search algorithms..." class="w-full bg-[#161b22] border border-brand-border rounded-xl pl-10 pr-4 py-3 text-xs text-white outline-none focus:border-brand-orange transition-all" oninput="applyFilters()">
            </div>

            <!-- Categories Dropdown -->
            <div class="w-full md:w-48">
                <select id="category-filter" class="w-full bg-[#161b22] border border-brand-border rounded-xl px-4 py-3 text-xs text-neutral-300 outline-none cursor-pointer focus:border-brand-orange transition-all" onchange="applyFilters()">
                    <option value="all">All Categories</option>
                    <option value="sorting">Sorting</option>
                    <option value="searching">Searching</option>
                    <option value="datastructures">Data Structures</option>
                </select>
            </div>

            <!-- Difficulty Dropdown -->
            <div class="w-full md:w-48">
                <select id="difficulty-filter" class="w-full bg-[#161b22] border border-brand-border rounded-xl px-4 py-3 text-xs text-neutral-300 outline-none cursor-pointer focus:border-brand-orange transition-all" onchange="applyFilters()">
                    <option value="all">All Difficulties</option>
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                </select>
            </div>

            <!-- Bookmarks Filter Toggle -->
            <div>
                <button id="bookmark-filter" class="w-12 h-11 bg-[#161b22] hover:bg-neutral-900 border border-brand-border rounded-xl flex items-center justify-center text-neutral-400 hover:text-white transition-all cursor-pointer" onclick="toggleBookmarkFilter()" title="Filter Bookmarked">
                    <i class="fa-regular fa-bookmark" id="bookmark-filter-icon"></i>
                </button>
            </div>
        </div>

        <!-- Section / Cards Grid Container -->
        <div id="sections-container" class="flex flex-col gap-10">
            <!-- Dynamic Sections Rendered Here -->
        </div>

    </main>

    <script>
      // 1. ALGORITHMS REPOSITORY DATA
      const ALGORITHMS = [
        // Sorting
        { id: 'bubble', name: 'Bubble Sort', category: 'Sorting', categoryKey: 'sorting', difficulty: 'Easy', difficultyKey: 'easy', desc: 'Sort an array using the bubble sort algorithm', active: true },
        { id: 'selection', name: 'Selection Sort', category: 'Sorting', categoryKey: 'sorting', difficulty: 'Easy', difficultyKey: 'easy', desc: 'Sort an array using the selection sort algorithm', active: true },
        { id: 'insertion', name: 'Insertion Sort', category: 'Sorting', categoryKey: 'sorting', difficulty: 'Easy', difficultyKey: 'easy', desc: 'Sort an array using the insertion sort algorithm', active: true },
        { id: 'merge', name: 'Merge Sort (Iterative)', category: 'Sorting', categoryKey: 'sorting', difficulty: 'Medium', difficultyKey: 'medium', desc: 'Sort an array using the bottom-up iterative merge sort algorithm', active: true },
        { id: 'bucket', name: 'Bucket Sort', category: 'Sorting', categoryKey: 'sorting', difficulty: 'Medium', difficultyKey: 'medium', desc: 'Sort an array using the bucket sort algorithm', active: true },
        { id: 'counting', name: 'Counting Sort', category: 'Sorting', categoryKey: 'sorting', difficulty: 'Easy', difficultyKey: 'easy', desc: 'Sort an array using the counting sort algorithm', active: true },
        
        // Searching
        { id: 'linear', name: 'Linear Search', category: 'Searching', categoryKey: 'searching', difficulty: 'Easy', difficultyKey: 'easy', desc: 'Search element by scanning values sequentially from left to right', active: true },
        { id: 'binary', name: 'Binary Search', category: 'Searching', categoryKey: 'searching', difficulty: 'Easy', difficultyKey: 'easy', desc: 'Search element by repeatedly dividing sorted intervals in half', active: true },
        
        // Data Structures
        { id: 'stack', name: 'Stack (Push / Pop)', category: 'Data Structures', categoryKey: 'datastructures', difficulty: 'Easy', difficultyKey: 'easy', desc: 'Visualize pushes, pops, and LIFO operations in a vertical stack', active: true },
        { id: 'queue', name: 'Queue (Enqueue / Dequeue)', category: 'Data Structures', categoryKey: 'datastructures', difficulty: 'Easy', difficultyKey: 'easy', desc: 'Visualize enqueues, dequeues, and FIFO operations in a line queue', active: true }
      ];

      // Pointers to bookmarks state saved in LocalStorage
      let bookmarkedAlgos = JSON.parse(localStorage.getItem('algomaster_bookmarks')) || [];
      let onlyShowBookmarks = false;

      // DOM elements caching
      const searchInput = document.getElementById('search-input');
      const categoryFilter = document.getElementById('category-filter');
      const difficultyFilter = document.getElementById('difficulty-filter');
      const bookmarkFilterBtn = document.getElementById('bookmark-filter');
      const bookmarkFilterIcon = document.getElementById('bookmark-filter-icon');
      const sectionsContainer = document.getElementById('sections-container');

      document.addEventListener('DOMContentLoaded', () => {
        applyFilters();
      });

      // ==========================================
      // FILTER LOGIC & DYNAMIC CARDS RENDERING
      // ==========================================
      function applyFilters() {
        const query = searchInput.value.toLowerCase().trim();
        const categoryVal = categoryFilter.value;
        const difficultyVal = difficultyFilter.value;

        // Filter algorithm list
        const filtered = ALGORITHMS.filter(algo => {
            // Search Query Filter
            const matchesSearch = algo.name.toLowerCase().includes(query) || algo.desc.toLowerCase().includes(query);
            
            // Category Filter
            const matchesCategory = (categoryVal === 'all' || algo.categoryKey === categoryVal);
            
            // Difficulty Filter
            const matchesDifficulty = (difficultyVal === 'all' || algo.difficultyKey === difficultyVal);
            
            // Bookmark filter
            const matchesBookmark = (!onlyShowBookmarks || bookmarkedAlgos.includes(algo.id));

            return matchesSearch && matchesCategory && matchesDifficulty && matchesBookmark;
        });

        renderSections(filtered);
      }

      function toggleBookmarkFilter() {
        onlyShowBookmarks = !onlyShowBookmarks;
        if (onlyShowBookmarks) {
            bookmarkFilterBtn.classList.replace('bg-[#161b22]', 'bg-brand-orange/20');
            bookmarkFilterBtn.classList.replace('text-neutral-400', 'text-brand-orange');
            bookmarkFilterBtn.classList.add('border-brand-orange/40');
            bookmarkFilterIcon.classList.replace('fa-regular', 'fa-solid');
        } else {
            bookmarkFilterBtn.classList.replace('bg-brand-orange/20', 'bg-[#161b22]');
            bookmarkFilterBtn.classList.replace('text-brand-orange', 'text-neutral-400');
            bookmarkFilterBtn.classList.remove('border-brand-orange/40');
            bookmarkFilterIcon.classList.replace('fa-solid', 'fa-regular');
        }
        applyFilters();
      }

      function toggleBookmark(e, algoId) {
        e.preventDefault();
        e.stopPropagation();

        if (bookmarkedAlgos.includes(algoId)) {
            bookmarkedAlgos = bookmarkedAlgos.filter(id => id !== algoId);
            document.getElementById(`bookmark-icon-${algoId}`).className = "fa-regular fa-bookmark text-neutral-400";
        } else {
            bookmarkedAlgos.push(algoId);
            document.getElementById(`bookmark-icon-${algoId}`).className = "fa-solid fa-bookmark text-brand-orange";
        }

        localStorage.setItem('algomaster_bookmarks', JSON.stringify(bookmarkedAlgos));
        
        // Re-apply filters if currently showing bookmarks only
        if (onlyShowBookmarks) {
            applyFilters();
        }
      }

      function launchVisualizer(algoId, active) {
        if (!active) {
            alert("Coming soon! This visualization module is currently under development.");
            return;
        }
        window.location.href = `dsa-visualizer.html?algo=${algoId}`;
      }

      function renderSections(items) {
        sectionsContainer.innerHTML = '';
        
        if (items.length === 0) {
            sectionsContainer.innerHTML = `
                <div class="text-center py-12 border border-dashed border-brand-border rounded-2xl bg-[#111]/30">
                    <i class="fa-regular fa-folder-open text-3xl text-neutral-600 mb-3 block"></i>
                    <p class="text-sm text-neutral-500 font-mono">No matching algorithms found.</p>
                </div>
            `;
            return;
        }

        // Group by category
        const categories = {};
        items.forEach(item => {
            if (!categories[item.category]) {
                categories[item.category] = [];
            }
            categories[item.category].push(item);
        });

        // Order categories logically
        const orderedCats = ['Sorting', 'Searching', 'Data Structures'];
        
        orderedCats.forEach(catName => {
            if (categories[catName]) {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = "flex flex-col gap-5";
                
                sectionDiv.innerHTML = `
                    <h2 class="text-xl font-bold tracking-tight text-white uppercase text-sm border-l-2 border-brand-orange pl-3">
                        ${catName}
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5" id="grid-${catName.replace(' ', '')}">
                        <!-- Cards here -->
                    </div>
                `;
                
                sectionsContainer.appendChild(sectionDiv);
                
                const grid = document.getElementById(`grid-${catName.replace(' ', '')}`);
                categories[catName].forEach(algo => {
                    const card = document.createElement('div');
                    card.className = `algo-card rounded-xl p-6 flex flex-col justify-between min-h-[150px] cursor-pointer relative z-10 ${algo.active ? '' : 'opacity-60'}`;
                    card.onclick = () => launchVisualizer(algo.id, algo.active);

                    const isBookmarked = bookmarkedAlgos.includes(algo.id);
                    const bookmarkClass = isBookmarked ? 'fa-solid fa-bookmark text-brand-orange' : 'fa-regular fa-bookmark text-neutral-400';
                    
                    const diffColor = algo.difficulty === 'Easy' ? 'bg-brand-orange/10 text-brand-orange border border-brand-orange/30' : 'bg-amber-950 text-amber-400 border border-amber-800';

                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-base font-bold text-white tracking-wide">${algo.name}</h3>
                                <p class="text-xs text-neutral-400 font-light mt-1.5 leading-relaxed max-w-[280px]">${algo.desc}</p>
                            </div>
                            <div class="flex items-center space-x-2">
                                <span class="text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider ${diffColor}">
                                    ${algo.difficulty}
                                </span>
                                <button class="w-8 h-8 rounded-lg hover:bg-neutral-800 flex items-center justify-center transition-all" onclick="toggleBookmark(event, '${algo.id}')">
                                    <i class="${bookmarkClass}" id="bookmark-icon-${algo.id}"></i>
                                </button>
                            </div>
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-mono text-neutral-500 border-t border-brand-border/40 pt-4 mt-2">
                            <span>Category: ${algo.category}</span>
                            <span class="text-brand-orange hover:underline font-semibold">
                                ${algo.active ? 'Launch Sandbox &rarr;' : 'Under Development'}
                            </span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        });
      }
    </script>

    <script src="js/synapse-canvas.js"></script>
    <script src="js/navbar-auth.js"></script>
</body>
</html>

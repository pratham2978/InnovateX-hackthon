<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoMaster — SYNAPSE DSA Visualizer</title>
    <!-- Tailwind CSS v4 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-brand-bg: #0A0A0A;
            --color-brand-card: #111111;
            --color-brand-text: #F5F5F5;
            --color-brand-red: #D90429;
            --color-brand-red-light: #E63946;
            --color-brand-orange: #C97B3D;
            --color-brand-orange-light: #D08B4E;
            --color-brand-border: #222222;
            
            --font-display: 'Plus Jakarta Sans', sans-serif;
            --font-sans: 'Inter', sans-serif;
        }
    </style>

    <style>
        /* Code highlight */
        .code-line { 
            display: block; 
            padding-left: 1rem; 
            font-family: monospace; 
            transition: all 0.15s ease; 
            border-left: 4px solid transparent; 
        }
        .line-active { 
            background-color: rgba(201, 123, 61, 0.12); 
            border-left-color: #C97B3D; 
            color: #ffffff !important; 
        }

        /* Height transition smooth with spring physics */
        .bar-transition { 
            transition: height 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        background-color 0.35s ease, 
                        transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                        border-color 0.35s ease,
                        box-shadow 0.35s ease; 
        }

        /* Micro-animations for visualizer states */
        .bar-compare {
            transform: scale(1.08) translateY(-4px);
            box-shadow: 0 10px 20px rgba(201, 123, 61, 0.2);
            z-index: 10;
        }

        .bar-swap {
            transform: scale(1.12) translateY(-8px);
            box-shadow: 0 12px 24px rgba(217, 4, 41, 0.3);
            animation: shake 0.35s ease-in-out;
            z-index: 20;
        }

        .bar-special {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 16px rgba(168, 85, 247, 0.2);
            z-index: 10;
        }

        .bar-sorted {
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        }

        @keyframes shake {
            0%, 100% { transform: scale(1.12) translateY(-8px) translateX(0); }
            25% { transform: scale(1.12) translateY(-8px) translateX(-3px); }
            75% { transform: scale(1.12) translateY(-8px) translateX(3px); }
        }

        /* Stack and Queue micro-animations */
        @keyframes slideInDown {
            from { transform: translateY(-30px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .animate-slide-down {
            animation: slideInDown 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes slideInRight {
            from { transform: translateX(30px) scale(0.9); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }
        .animate-slide-right {
            animation: slideInRight 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        .pointer-transition {
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        /* Ambient Glowing Backdrops */
        .glow-bg {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            filter: blur(130px);
            opacity: 0.25;
            transition: opacity 0.8s, transform 0.8s;
        }

        /* Grid background pattern */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: -30;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        }

        /* Glassmorphism panels */
        .glass-panel {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
    </style>
</head>
<body class="relative min-h-screen bg-brand-bg text-brand-text selection:bg-brand-orange selection:text-white" id="app-body">

    <!-- Grid Layout Background -->
    <div class="grid-overlay"></div>

    <!-- Interactive Neural Network Background Canvas -->
    <canvas id="canvas-synapse" class="fixed inset-0 w-full h-full -z-20 pointer-events-none opacity-20"></canvas>

    <!-- Ambient Glow Element -->
    <div id="glow-1" class="glow-bg w-[600px] h-[600px] top-[10%] left-[20%] bg-brand-orange/10"></div>

    <!-- Navigation Header -->
    <nav class="sticky top-0 z-50 w-full px-6 py-4 border-b border-brand-border bg-brand-bg/60 backdrop-blur-md">

            <div class="hidden md:flex items-center gap-8 text-sm font-medium text-neutral-400">
                <a href="index.html" class="hover:text-white transition-colors">Home</a>
                <a href="features.html" class="hover:text-white transition-colors">Features</a>
                <a href="global-ranking.html" class="hover:text-white transition-colors">Global Ranking</a>
            </div>

            <div class="flex items-center gap-4" id="nav-auth-container">
                <button onclick="window.location.href='auth.html'" class="text-xs font-semibold px-4 py-2 border border-brand-border rounded-lg text-neutral-300 hover:text-white hover:border-neutral-500 transition-all cursor-pointer">
                    Log In
                </button>
                <a href="dsa-visualizer-menu.html" class="text-xs font-semibold px-4 py-2 border border-brand-border rounded-lg text-neutral-300 hover:text-white hover:border-neutral-500 transition-all">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Back to Animations Dashboard
                </a>
            </div>
        </div>
    </nav>
    <!-- Auth Guard: redirect to login if not authenticated -->
    <script src="js/auth-guard.js"></script>


    <!-- Main Visualizer Header / Controls selector -->
    <header class="max-w-[1600px] mx-auto px-6 mt-8 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-wide flex items-center gap-2">
                AlgoMaster <span class="text-brand-orange text-sm font-semibold px-2 py-0.5 rounded bg-brand-orange/10 border border-brand-orange/30">DSA Visualizer</span>
            </h1>
        </div>
        
        <!-- Algorithm Tabs (Dynamic header options based on category) -->
        <div class="flex items-center space-x-2 bg-[#161b22] border border-gray-800 p-1.5 rounded-xl shadow-inner relative z-20" id="algo-tabs-group">
             <!-- Populated dynamically -->
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 max-w-[1600px] mx-auto relative z-10">
      
      <!-- Code Editor Panel (Left Column - 5 cols) -->
      <section class="lg:col-span-5 glass-panel rounded-xl overflow-hidden flex flex-col h-[530px] shadow-2xl relative z-10">
        <div class="bg-[#21262d] px-4 py-3 border-b border-gray-800 flex items-center justify-between">
          <span id="code-filename" class="font-mono text-sm text-gray-300">BubbleSort.java</span>
          <span id="code-difficulty" class="text-xs px-2.5 py-0.5 rounded-full bg-brand-orange/10 text-brand-orange border border-brand-orange/30 font-bold uppercase tracking-wider">Easy</span>
        </div>
        <div id="code-container" class="p-4 flex-grow overflow-auto font-mono text-[12.5px] leading-relaxed text-neutral-400 bg-[#0d1117] select-none pr-6">
            <!-- Populated dynamically -->
        </div>
      </section>

      <!-- Visualization and Playback Controls (Right Column - 7 cols) -->
      <section class="lg:col-span-7 flex flex-col space-y-6">
        
        <!-- Toolbar Panel (Presets & Inputs) -->
        <div class="glass-panel rounded-xl p-4 flex flex-col md:flex-row items-center justify-between gap-4">
          
          <!-- Presets buttons -->
          <div class="flex items-center flex-wrap gap-2 text-xs font-semibold" id="presets-panel">
            <span class="text-neutral-500 uppercase tracking-wider text-[10px] mr-1">Presets:</span>
            <button id="preset-standard" class="px-2.5 py-1.5 rounded bg-neutral-900 border border-gray-800 text-brand-orange font-bold shadow transition-all cursor-pointer" onclick="loadPreset('standard')">Standard</button>
            <button id="preset-small" class="px-2.5 py-1.5 rounded bg-[#161b22] hover:bg-neutral-900 border border-gray-800 text-neutral-300 transition-all cursor-pointer" onclick="loadPreset('small')">Small</button>
            <button id="preset-reverse" class="px-2.5 py-1.5 rounded bg-[#161b22] hover:bg-neutral-900 border border-gray-800 text-neutral-300 transition-all cursor-pointer" onclick="loadPreset('reverse')">Reverse</button>
            <button id="preset-sorted" class="px-2.5 py-1.5 rounded bg-[#161b22] hover:bg-neutral-900 border border-gray-800 text-neutral-300 transition-all cursor-pointer" onclick="loadPreset('sorted')">Sorted</button>
            <button id="preset-nearly" class="px-2.5 py-1.5 rounded bg-[#161b22] hover:bg-neutral-900 border border-gray-800 text-neutral-300 transition-all cursor-pointer" onclick="loadPreset('nearly')">Nearly Sorted</button>
            <button id="preset-equal" class="px-2.5 py-1.5 rounded bg-[#161b22] hover:bg-neutral-900 border border-gray-800 text-neutral-300 transition-all cursor-pointer" onclick="loadPreset('equal')">All Equal</button>
          </div>

          <!-- Dynamic search target input for Searching algorithms -->
          <div class="flex items-center gap-2 hidden text-xs font-semibold" id="searching-target-panel">
              <span class="text-neutral-500 uppercase tracking-wider text-[10px]">Target:</span>
              <input type="number" id="search-target-val" class="bg-[#0d1117] border border-gray-800 text-xs px-2.5 py-1.5 rounded-lg w-16 outline-none focus:border-brand-orange font-mono text-brand-orange font-bold" value="34" onchange="changeSearchTarget()">
          </div>

          <!-- Dynamic actions for Data Structures (Stack / Queue) -->
          <div class="flex items-center gap-2 hidden text-xs font-semibold" id="ds-actions-panel">
              <input type="number" id="ds-push-val" placeholder="Val" class="bg-[#0d1117] border border-gray-800 text-xs px-2.5 py-1.5 rounded-lg w-16 outline-none focus:border-brand-orange font-mono text-brand-orange font-bold">
              <button id="btn-ds-push" class="px-3 py-1.5 bg-brand-orange hover:bg-brand-orange-light text-white font-bold rounded-lg transition-all cursor-pointer" onclick="triggerDSPush()">Push</button>
              <button id="btn-ds-pop" class="px-3 py-1.5 bg-neutral-900 hover:bg-[#161b22] border border-gray-800 text-neutral-300 rounded-lg transition-all cursor-pointer" onclick="triggerDSPop()">Pop</button>
          </div>

          <!-- Custom Array Input Trigger -->
          <div class="flex items-center gap-2 ml-auto w-full md:w-auto border-t md:border-t-0 border-gray-800 pt-3 md:pt-0" id="custom-input-panel">
             <button id="preset-custom" class="px-2.5 py-1.5 rounded bg-[#161b22] hover:bg-neutral-900 border border-gray-800 text-xs text-neutral-300 transition-all cursor-pointer" onclick="toggleCustomInput()">Custom</button>
             <input type="text" id="custom-arr-val" class="hidden bg-[#0d1117] border border-gray-800 text-xs px-2.5 py-1.5 rounded-lg w-32 outline-none focus:border-brand-orange font-mono text-brand-orange font-bold" value="64, 34, 25, 12, 22, 11, 90" onkeydown="if(event.key === 'Enter') applyCustomInput()">
             <button id="custom-arr-apply" class="hidden text-xs bg-brand-orange hover:bg-brand-orange-light text-white px-2.5 py-1.5 rounded-lg font-bold transition-all cursor-pointer" onclick="applyCustomInput()">Apply</button>
          </div>
        </div>

        <!-- Graph Visualization Canvas -->
        <div class="glass-panel rounded-xl p-8 flex-grow flex flex-col justify-end min-h-[350px] relative overflow-hidden shadow-2xl">
          <!-- Textual Array Representation -->
          <div id="array-string" class="absolute top-4 left-4 font-mono text-[10px] text-neutral-500 bg-[#0d1117] px-3 py-1.5 rounded-lg border border-gray-800">
              arr = [64, 34, 25, 12, 22, 11, 90]
          </div>

          <!-- Bars Viewport -->
          <div id="bars-viewport" class="flex items-end justify-center space-x-3 sm:space-x-4 w-full h-[220px] px-4">
              <!-- Rendered dynamically -->
          </div>
          <div class="h-6"></div> <!-- Padding space for pointer arrows -->
        </div>

        <!-- Playback Controls Bar -->
        <div class="glass-panel rounded-xl p-4 flex flex-wrap items-center justify-between gap-4">
          <!-- Play / Prev / Next / Reset -->
          <div class="flex items-center space-x-2">
            <button id="btn-prev" class="p-3 bg-neutral-900 hover:bg-neutral-800 border border-gray-800 rounded-xl text-neutral-300 transition-all cursor-pointer" onclick="stepBackward()" title="Step Backward">
              <i class="fa-solid fa-backward-step"></i>
            </button>
            <button id="btn-play" class="p-3.5 rounded-xl bg-brand-orange hover:bg-brand-orange-light text-white flex items-center justify-center transition-all cursor-pointer shadow-lg shadow-brand-orange/20" onclick="togglePlayPause()" title="Play / Pause">
              <i class="fa-solid fa-play text-lg ml-0.5 text-black" id="play-icon"></i>
            </button>
            <button id="btn-next" class="p-3 bg-neutral-900 hover:bg-neutral-800 border border-gray-800 rounded-xl text-neutral-300 transition-all cursor-pointer" onclick="stepForward()" title="Step Forward">
              <i class="fa-solid fa-forward-step"></i>
            </button>
            <button id="btn-reset" class="p-3 bg-neutral-900 hover:bg-neutral-800 border border-gray-800 rounded-xl text-neutral-300 transition-all cursor-pointer" onclick="forceReset()" title="Reset Array">
              <i class="fa-solid fa-arrow-rotate-left"></i>
            </button>
          </div>

          <!-- Timeline Scrubber -->
          <div class="flex items-center space-x-3 bg-[#0d1117] px-4 py-2 rounded-xl border border-gray-800 flex-grow min-w-[280px]">
            <span class="text-[10px] text-neutral-500 font-bold font-mono min-w-[70px]" id="step-counter">Step 0 / 0</span>
            <input id="timeline-slider" type="range" min="0" max="0" value="0" class="accent-brand-orange flex-grow h-1.5 bg-neutral-800 rounded-lg appearance-none cursor-pointer" oninput="scrubTimeline(parseInt(this.value))">
          </div>

          <!-- Speed & Fullscreen -->
          <div class="flex items-center space-x-3">
             <div class="flex items-center space-x-2 bg-[#0d1117] px-3 py-2 rounded-xl border border-gray-800">
                <span class="text-[10px] text-neutral-500 font-bold font-mono uppercase">Speed:</span>
                <select id="speed-select" class="bg-transparent text-brand-orange font-bold font-mono text-xs outline-none cursor-pointer border-none" onchange="changeSpeed()">
                  <option value="1200">0.5x</option>
                  <option value="700" selected>1.0x</option>
                  <option value="400">1.5x</option>
                  <option value="150">2.0x</option>
                </select>
             </div>
             <button class="p-3 bg-neutral-900 hover:bg-neutral-800 border border-gray-800 rounded-xl text-neutral-400 hover:text-white transition-all cursor-pointer" onclick="toggleFullscreen()" title="Toggle Fullscreen">
               <i class="fa-solid fa-expand"></i>
             </button>
          </div>
        </div>

        <!-- Execution logs (Educational console) -->
        <div class="glass-panel rounded-xl p-4 flex flex-col h-[130px] overflow-hidden">
          <h4 class="text-[10px] font-bold text-neutral-500 uppercase tracking-wider border-gray-800 pb-2 mb-2 flex items-center gap-1.5">
             <i class="fa-solid fa-terminal text-brand-orange"></i> Trace Execution Console
          </h4>
          <div id="console-logs" class="flex-grow overflow-y-auto font-mono text-xs text-neutral-300 flex flex-col gap-1 pr-2">
             <div class="text-neutral-500">> Visualizer loaded. Press play or step manually.</div>
          </div>
        </div>

      </section>

    </main>

    <script>
      // 1. DATA AND ALGORITHM STRINGS STORAGE
      const ALGORITHMS = {
        bubble: {
          name: "BubbleSort.java",
          category: "sorting",
          difficulty: "Easy",
          lines: [
            "public void bubbleSort(int[] arr) {",
            "  int n = arr.length;",
            "  for (int i = 0; i < n - 1; i++) {",
            "    boolean swapped = false;",
            "    for (int j = 0; j < n - i - 1; j++) {",
            "      if (arr[j] > arr[j + 1]) {",
            "        // Swap elements",
            "        int temp = arr[j];",
            "        arr[j] = arr[j + 1];",
            "        arr[j + 1] = temp;",
            "        swapped = true;",
            "      }",
            "    }",
            "    if (!swapped) break;",
            "  }",
            "}"
          ]
        },
        selection: {
          name: "SelectionSort.java",
          category: "sorting",
          difficulty: "Easy",
          lines: [
            "public void selectionSort(int[] arr) {",
            "  int n = arr.length;",
            "  for (int i = 0; i < n - 1; i++) {",
            "    int minIdx = i;",
            "    for (int j = i + 1; j < n; j++) {",
            "      if (arr[j] < arr[minIdx]) {",
            "        minIdx = j;",
            "      }",
            "    }",
            "    // Swap elements",
            "    int temp = arr[minIdx];",
            "    arr[minIdx] = arr[i];",
            "    arr[i] = temp;",
            "  }",
            "}"
          ]
        },
        insertion: {
          name: "InsertionSort.java",
          category: "sorting",
          difficulty: "Easy",
          lines: [
            "public void insertionSort(int[] arr) {",
            "  int n = arr.length;",
            "  for (int i = 1; i < n; i++) {",
            "    int key = arr[i];",
            "    int j = i - 1;",
            "    while (j >= 0 && arr[j] > key) {",
            "      arr[j + 1] = arr[j];",
            "      j--;",
            "    }",
            "    arr[j + 1] = key;",
            "  }",
            "}"
          ]
        },
        merge: {
          name: "MergeSort.java",
          category: "sorting",
          difficulty: "Medium",
          lines: [
            "public void mergeSort(int[] arr) {",
            "  int n = arr.length;",
            "  for (int sz = 1; sz < n; sz *= 2) {",
            "    for (int lo = 0; lo < n - sz; lo += 2 * sz) {",
            "      int mid = lo + sz - 1;",
            "      int hi = Math.min(lo + 2 * sz - 1, n - 1);",
            "      merge(arr, lo, mid, hi);",
            "    }",
            "  }",
            "}",
            "// helper merge function",
            "private void merge(int[] arr, int lo, int mid, int hi) {",
            "  int[] left = Arrays.copyOfRange(arr, lo, mid + 1);",
            "  int[] right = Arrays.copyOfRange(arr, mid + 1, hi + 1);",
            "  int i = 0, j = 0, k = lo;",
            "  while (i < left.length && j < right.length) {",
            "    arr[k++] = left[i] <= right[j] ? left[i++] : right[j++];",
            "  }",
            "  while (i < left.length) arr[k++] = left[i++];",
            "  while (j < right.length) arr[k++] = right[j++];",
            "}"
          ]
        },
        bucket: {
          name: "BucketSort.java",
          category: "sorting",
          difficulty: "Medium",
          lines: [
            "public void bucketSort(int[] arr) {",
            "  int n = arr.length, max = getMax(arr);",
            "  int numBuckets = 3;",
            "  List<Integer>[] buckets = new ArrayList[numBuckets];",
            "  for (int i = 0; i < n; i++) {",
            "    int bIdx = (arr[i] * numBuckets) / (max + 1);",
            "    buckets[bIdx].add(arr[i]);",
            "  }",
            "  for (List<Integer> b : buckets) {",
            "    Collections.sort(b);",
            "  }",
            "  int idx = 0;",
            "  for (List<Integer> b : buckets) {",
            "    for (int x : b) arr[idx++] = x;",
            "  }",
            "}"
          ]
        },
        counting: {
          name: "CountingSort.java",
          category: "sorting",
          difficulty: "Easy",
          lines: [
            "public void countingSort(int[] arr) {",
            "  int n = arr.length, max = getMax(arr);",
            "  int[] count = new int[max + 1];",
            "  for (int x : arr) count[x]++;",
            "  int idx = 0;",
            "  for (int i = 0; i <= max; i++) {",
            "    while (count[i] > 0) {",
            "      arr[idx++] = i;",
            "      count[i]--;",
            "    }",
            "  }",
            "}"
          ]
        },
        linear: {
          name: "LinearSearch.java",
          category: "searching",
          difficulty: "Easy",
          lines: [
            "public int linearSearch(int[] arr, int target) {",
            "  int n = arr.length;",
            "  for (int i = 0; i < n; i++) {",
            "    if (arr[i] == target) {",
            "      return i; // Found!",
            "    }",
            "  }",
            "  return -1; // Not found",
            "}"
          ]
        },
        binary: {
          name: "BinarySearch.java",
          category: "searching",
          difficulty: "Easy",
          lines: [
            "public int binarySearch(int[] arr, int target) {",
            "  int low = 0;",
            "  int high = arr.length - 1;",
            "  while (low <= high) {",
            "    int mid = low + (high - low) / 2;",
            "    if (arr[mid] == target) {",
            "      return mid; // Found!",
            "    }",
            "    if (arr[mid] < target) {",
            "      low = mid + 1;",
            "    } else {",
            "      high = mid - 1;",
            "    }",
            "  }",
            "  return -1;",
            "}"
          ]
        },
        stack: {
          name: "Stack.java",
          category: "datastructures",
          difficulty: "Easy",
          lines: [
            "public class Stack {",
            "  private int[] arr = new int[10];",
            "  private int top = -1;",
            "  public void push(int val) {",
            "    if (top >= 9) return; // Overflow",
            "    arr[++top] = val;",
            "  }",
            "  public int pop() {",
            "    if (top < 0) return -1; // Underflow",
            "    return arr[top--];",
            "  }",
            "}"
          ]
        },
        queue: {
          name: "Queue.java",
          category: "datastructures",
          difficulty: "Easy",
          lines: [
            "public class Queue {",
            "  private int[] arr = new int[10];",
            "  private int front = 0, rear = -1;",
            "  public void enqueue(int val) {",
            "    if (rear >= 9) return; // Overflow",
            "    arr[++rear] = val;",
            "  }",
            "  public int dequeue() {",
            "    if (front > rear) return -1; // Empty",
            "    return arr[front++];",
            "  }",
            "}"
          ]
        }
      };

      const PRESETS = {
        standard: [64, 34, 25, 12, 22, 11, 90],
        small: [8, 3, 9, 2, 5],
        reverse: [90, 80, 70, 60, 50, 40, 30, 20],
        sorted: [11, 12, 22, 25, 34, 64, 90],
        nearly: [11, 12, 25, 22, 34, 64, 90],
        equal: [40, 40, 40, 40, 40, 40, 40]
      };

      // 2. STATE APP TRACKERS
      let currentAlgo = 'bubble';
      let data = [...PRESETS.standard];
      let steps = [];          // Recorded animation steps
      let currentStepIdx = 0;  // Current active step index
      let isPlaying = false;
      let playbackInterval = null; // Auto play timer reference
      let stepDelay = 700; // interval in milliseconds
      let searchTarget = 34; // default target for search
      let dsElements = [25, 42, 60]; // Persistent structure nodes

      // 3. DOM ELEMENTS CACHE REFERENCE
      const containerCode = document.getElementById('code-container');
      const filenameCode = document.getElementById('code-filename');
      const difficultyCode = document.getElementById('code-difficulty');
      const viewportBars = document.getElementById('bars-viewport');
      const stringArray = document.getElementById('array-string');
      const btnPlay = document.getElementById('btn-play');
      const playIcon = document.getElementById('play-icon');
      const timelineSlider = document.getElementById('timeline-slider');
      const stepCounter = document.getElementById('step-counter');
      const speedSelect = document.getElementById('speed-select');
      const customArrInput = document.getElementById('custom-arr-val');
      const customArrApply = document.getElementById('custom-arr-apply');

      const dsValBox = document.getElementById('ds-push-val');
      const dsBtnPush = document.getElementById('btn-ds-push');
      const dsBtnPop = document.getElementById('btn-ds-pop');

      // 4. CORE ENGINE LIFECYCLE INITIALIZER
      function init() {
        // Read URL Param
        const urlParams = new URLSearchParams(window.location.search);
        const algoParam = urlParams.get('algo');
        if (algoParam && ALGORITHMS[algoParam]) {
            currentAlgo = algoParam;
        }

        renderTabsGroup();
        renderCodeStructure();
        adjustToolbarPanels();
        generateAnimationSteps();
        renderStep(0);

      }

      function renderTabsGroup() {
        const category = ALGORITHMS[currentAlgo].category;
        const tabsGroup = document.getElementById('algo-tabs-group');
        tabsGroup.innerHTML = '';

        // Filter and list algorithms belonging to same category

                    ? "px-4 py-1.5 rounded-lg text-xs font-bold bg-brand-orange text-white shadow-md transition-all cursor-pointer font-bold"
                    : "px-4 py-1.5 rounded-lg text-xs font-semibold text-neutral-400 hover:text-white transition-all cursor-pointer";

      function renderCodeStructure() {
        filenameCode.innerText = ALGORITHMS[currentAlgo].name;
        difficultyCode.innerText = ALGORITHMS[currentAlgo].difficulty;
        containerCode.innerHTML = ALGORITHMS[currentAlgo].lines

      }

      function adjustToolbarPanels() {
        const category = ALGORITHMS[currentAlgo].category;
        const presets = document.getElementById('presets-panel');
        const searchTargetPanel = document.getElementById('searching-target-panel');
        const dsActions = document.getElementById('ds-actions-panel');
        const customInputPanel = document.getElementById('custom-input-panel');

        if (category === 'sorting') {
            presets.classList.remove('hidden');
            searchTargetPanel.classList.add('hidden');
            dsActions.classList.add('hidden');
            customInputPanel.classList.remove('hidden');
        } else if (category === 'searching') {
            presets.classList.remove('hidden');
            searchTargetPanel.classList.remove('hidden');
            dsActions.classList.add('hidden');
            customInputPanel.classList.remove('hidden');
            // Auto-sort presets for binary search
            if (currentAlgo === 'binary') {
                data.sort((a,b) => a-b);
            }
        } else if (category === 'datastructures') {
            presets.classList.add('hidden');
            searchTargetPanel.classList.add('hidden');
            dsActions.classList.remove('hidden');
            customInputPanel.classList.add('hidden');
            
            // Adjust buttons for Stack/Queue
            if (currentAlgo === 'stack') {
                dsBtnPush.innerText = 'Push';
                dsBtnPop.innerText = 'Pop';
            } else {
                dsBtnPush.innerText = 'Enqueue';
                dsBtnPop.innerText = 'Dequeue';
            }
        }
      }

      // ==========================================
      // ANIMATION STEPS GENERATORS (PRE-RECORD)
      // ==========================================
      function generateAnimationSteps() {
        steps = [];
        const category = ALGORITHMS[currentAlgo].category;
        
        if (category === 'sorting') {
            const arrCopy = [...data];
            if (currentAlgo === 'bubble') recordBubbleSteps(arrCopy);
            if (currentAlgo === 'selection') recordSelectionSteps(arrCopy);
            if (currentAlgo === 'insertion') recordInsertionSteps(arrCopy);
            if (currentAlgo === 'merge') recordMergeSteps(arrCopy);
            if (currentAlgo === 'bucket') recordBucketSteps(arrCopy);
            if (currentAlgo === 'counting') recordCountingSteps(arrCopy);
        } else if (category === 'searching') {
            const arrCopy = [...data];
            if (currentAlgo === 'linear') recordLinearSearchSteps(arrCopy);
            if (currentAlgo === 'binary') recordBinarySearchSteps(arrCopy);
        } else if (category === 'datastructures') {
            const arrCopy = [...dsElements];
            if (currentAlgo === 'stack') recordStackSteps(arrCopy);
            if (currentAlgo === 'queue') recordQueueSteps(arrCopy);
        }

        // Set Slider Boundaries
        timelineSlider.max = steps.length - 1;
        timelineSlider.value = 0;
        stepCounter.innerText = `Step 0 / ${steps.length - 1}`;
      }

      function recordBubbleSteps(arr) {
        let n = arr.length;
        steps.push({ arr: [...arr], line: 0, type: 'default', compare: [], pointers: {}, log: "Initialize Bubble Sort execution." });
        steps.push({ arr: [...arr], line: 1, type: 'default', compare: [], pointers: {}, log: `Set array length variable n = ${n}` });

        for (let i = 0; i < n - 1; i++) {
            steps.push({ arr: [...arr], line: 2, type: 'default', compare: [], pointers: { 'i': i }, log: `Outer loop iteration: i = ${i}` });
            let swapped = false;
            steps.push({ arr: [...arr], line: 3, type: 'default', compare: [], pointers: { 'i': i }, log: "Set swapped flag = false" });

            for (let j = 0; j < n - i - 1; j++) {
                steps.push({ arr: [...arr], line: 4, type: 'default', compare: [], pointers: { 'i': i, 'j': j, 'j+1': j + 1 }, log: `Inner loop comparator pointers: j = ${j}, j+1 = ${j + 1}` });
                steps.push({ arr: [...arr], line: 5, type: 'compare', compare: [j, j + 1], pointers: { 'i': i, 'j': j, 'j+1': j + 1 }, log: `Comparing arr[j] (${arr[j]}) with arr[j+1] (${arr[j+1]})` });

                if (arr[j] > arr[j + 1]) {
                    steps.push({ arr: [...arr], line: 5, type: 'swap', compare: [j, j + 1], pointers: { 'i': i, 'j': j, 'j+1': j + 1 }, log: `Since ${arr[j]} > ${arr[j+1]}, trigger elements swap` });
                    let temp = arr[j];
                    arr[j] = arr[j + 1];
                    arr[j + 1] = temp;
                    swapped = true;
                    steps.push({ arr: [...arr], line: 7, type: 'swap', compare: [j, j + 1], pointers: { 'i': i, 'j': j, 'j+1': j + 1 }, log: `Elements swapped. Array state: [${arr.join(', ')}]` });
                }
            }
            steps.push({ arr: [...arr], line: 13, type: 'default', compare: [], pointers: { 'i': i }, log: `Check swap status: swapped = ${swapped}` });
            if (!swapped) {
                steps.push({ arr: [...arr], line: 13, type: 'default', compare: [], pointers: {}, log: "No swaps occurred this pass; array is sorted early." });
                break;
            }
        }
        steps.push({ arr: [...arr], line: 15, type: 'sorted-all', compare: [], pointers: {}, log: "Bubble Sort complete!" });
      }

      function recordSelectionSteps(arr) {
        let n = arr.length;
        steps.push({ arr: [...arr], line: 0, type: 'default', compare: [], pointers: {}, log: "Initialize Selection Sort execution." });
        steps.push({ arr: [...arr], line: 1, type: 'default', compare: [], pointers: {}, log: `Set array length variable n = ${n}` });

        for (let i = 0; i < n - 1; i++) {
            steps.push({ arr: [...arr], line: 2, type: 'default', compare: [], pointers: { 'i': i }, log: `Outer loop iteration: i = ${i}` });
            let minIdx = i;
            steps.push({ arr: [...arr], line: 3, type: 'special', compare: [minIdx], pointers: { 'i': i, 'min': minIdx }, log: `Assume minimum index minIdx = i (${i}, value: ${arr[i]})` });

            for (let j = i + 1; j < n; j++) {
                steps.push({ arr: [...arr], line: 4, type: 'default', compare: [], pointers: { 'i': i, 'min': minIdx, 'j': j }, log: `Scanning j = ${j}` });
                steps.push({ arr: [...arr], line: 5, type: 'compare', compare: [j, minIdx], pointers: { 'i': i, 'min': minIdx, 'j': j }, log: `Comparing arr[j] (${arr[j]}) < arr[minIdx] (${arr[minIdx]})` });

                if (arr[j] < arr[minIdx]) {
                    minIdx = j;
                    steps.push({ arr: [...arr], line: 6, type: 'special', compare: [minIdx], pointers: { 'i': i, 'min': minIdx, 'j': j }, log: `Update minimum index minIdx = ${j} (value: ${arr[j]})` });
                }
            }

            steps.push({ arr: [...arr], line: 10, type: 'swap', compare: [i, minIdx], pointers: { 'i': i, 'min': minIdx }, log: `Prepare to swap minimum element at minIdx (${minIdx}) with index i (${i})` });
            let temp = arr[minIdx];
            arr[minIdx] = arr[i];
            arr[i] = temp;
            steps.push({ arr: [...arr], line: 12, type: 'swap', compare: [i, minIdx], pointers: { 'i': i, 'min': minIdx }, log: `Swapped. Array state: [${arr.join(', ')}]` });
        }
        steps.push({ arr: [...arr], line: 14, type: 'sorted-all', compare: [], pointers: {}, log: "Selection Sort complete!" });
      }

      function recordInsertionSteps(arr) {
        let n = arr.length;
        steps.push({ arr: [...arr], line: 0, type: 'default', compare: [], pointers: {}, log: "Initialize Insertion Sort execution." });
        steps.push({ arr: [...arr], line: 1, type: 'default', compare: [], pointers: {}, log: `Set array length variable n = ${n}` });

        for (let i = 1; i < n; i++) {
            steps.push({ arr: [...arr], line: 2, type: 'default', compare: [], pointers: { 'i': i }, log: `Outer loop iteration: i = ${i}` });
            let key = arr[i];
            steps.push({ arr: [...arr], line: 3, type: 'special', compare: [i], pointers: { 'i': i, 'key': i }, log: `Set insertion key value = arr[i] (${key})` });
            let j = i - 1;
            steps.push({ arr: [...arr], line: 4, type: 'default', compare: [], pointers: { 'i': i, 'key': i, 'j': j }, log: `Set comparator pointer j = i - 1 (${j})` });

            while (j >= 0 && arr[j] > key) {
                steps.push({ arr: [...arr], line: 5, type: 'compare', compare: [j], pointers: { 'i': i, 'key': i, 'j': j }, log: `Checking while check: is arr[j] (${arr[j]}) > key (${key})?` });
                arr[j + 1] = arr[j];
                steps.push({ arr: [...arr], line: 6, type: 'swap', compare: [j, j + 1], pointers: { 'i': i, 'key': i, 'j': j }, log: `Shifted arr[j] (${arr[j]}) to index ${j+1}` });
                j--;
                steps.push({ arr: [...arr], line: 7, type: 'default', compare: [], pointers: { 'i': i, 'key': i, 'j': j }, log: `Decremented pointer j to ${j}` });
            }
            steps.push({ arr: [...arr], line: 5, type: 'default', compare: [], pointers: { 'i': i, 'key': i, 'j': j }, log: "While loop check failed." });
            arr[j + 1] = key;
            steps.push({ arr: [...arr], line: 9, type: 'special', compare: [j + 1], pointers: { 'i': i, 'key': j + 1 }, log: `Insert key value (${key}) back at index j + 1 (${j + 1})` });
        }
        steps.push({ arr: [...arr], line: 11, type: 'sorted-all', compare: [], pointers: {}, log: "Insertion Sort complete!" });
      }

      function recordMergeSteps(arr) {
        let n = arr.length;
        steps.push({ arr: [...arr], line: 0, type: 'default', compare: [], pointers: {}, log: "Initialize Iterative Merge Sort." });
        steps.push({ arr: [...arr], line: 1, type: 'default', compare: [], pointers: {}, log: `Set variable n = ${n}` });

        for (let sz = 1; sz < n; sz *= 2) {
            steps.push({ arr: [...arr], line: 2, type: 'default', compare: [], pointers: {}, log: `Outer loop: Subarray size sz = ${sz}` });
            for (let lo = 0; lo < n - sz; lo += 2 * sz) {
                let mid = lo + sz - 1;
                let hi = Math.min(lo + 2 * sz - 1, n - 1);
                steps.push({ arr: [...arr], line: 3, type: 'default', compare: [], pointers: { 'lo': lo, 'mid': mid, 'hi': hi }, log: `Merging subarrays: [${lo}...${mid}] and [${mid+1}...${hi}]` });
                
                mergeHelper(arr, lo, mid, hi);
            }
        }
        steps.push({ arr: [...arr], line: 9, type: 'sorted-all', compare: [], pointers: {}, log: "Merge Sort complete!" });
      }

      function mergeHelper(arr, lo, mid, hi) {
          let left = arr.slice(lo, mid + 1);
          let right = arr.slice(mid + 1, hi + 1);
          let i = 0, j = 0, k = lo;

          while (i < left.length && j < right.length) {
              steps.push({ 
                  arr: [...arr], 
                  line: 16, 
                  type: 'compare', 
                  compare: [lo + i, mid + 1 + j], 
                  pointers: { 'lo': lo, 'mid': mid, 'hi': hi, 'i': lo + i, 'j': mid + 1 + j }, 
                  log: `Comparing left[${i}] (${left[i]}) and right[${j}] (${right[j]})` 
              });

              if (left[i] <= right[j]) {
                  arr[k] = left[i];
                  steps.push({ 
                      arr: [...arr], 
                      line: 17, 
                      type: 'swap', 
                      compare: [k], 
                      pointers: { 'lo': lo, 'mid': mid, 'hi': hi, 'k': k }, 
                      log: `Copy ${left[i]} from left subarray to index ${k}` 
                  });
                  i++;
              } else {
                  arr[k] = right[j];
                  steps.push({ 
                      arr: [...arr], 
                      line: 17, 
                      type: 'swap', 
                      compare: [k], 
                      pointers: { 'lo': lo, 'mid': mid, 'hi': hi, 'k': k }, 
                      log: `Copy ${right[j]} from right subarray to index ${k}` 
                  });
                  j++;
              }
              k++;
          }

          while (i < left.length) {
              arr[k] = left[i];
              steps.push({ 
                  arr: [...arr], 
                  line: 19, 
                  type: 'swap', 
                  compare: [k], 
                  pointers: { 'lo': lo, 'mid': mid, 'hi': hi, 'k': k }, 
                  log: `Copy remaining left[${i}] (${left[i]}) to index ${k}` 
              });
              i++;
              k++;
          }

          while (j < right.length) {
              arr[k] = right[j];
              steps.push({ 
                  arr: [...arr], 
                  line: 20, 
                  type: 'swap', 
                  compare: [k], 
                  pointers: { 'lo': lo, 'mid': mid, 'hi': hi, 'k': k }, 
                  log: `Copy remaining right[${j}] (${right[j]}) to index ${k}` 
              });
              j++;
              k++;
          }
      }

      function recordBucketSteps(arr) {
        let n = arr.length;
        steps.push({ arr: [...arr], line: 0, type: 'default', compare: [], pointers: {}, log: "Initialize Bucket Sort." });

        let max = Math.max(...arr, 1);
        steps.push({ arr: [...arr], line: 1, type: 'default', compare: [], pointers: {}, log: `Identify max element = ${max}` });

        let numBuckets = 3;
        let buckets = Array.from({ length: numBuckets }, () => []);
        steps.push({ arr: [...arr], line: 2, type: 'default', compare: [], pointers: {}, log: `Create ${numBuckets} empty buckets.` });

        for (let i = 0; i < n; i++) {
            let bucketIdx = Math.min(Math.floor((arr[i] * numBuckets) / (max + 1)), numBuckets - 1);
            buckets[bucketIdx].push(arr[i]);
            steps.push({ arr: [...arr], line: 5, type: 'compare', compare: [i], pointers: { 'i': i, 'bucket': bucketIdx }, log: `Put element ${arr[i]} in bucket ${bucketIdx}` });
        }

        // Sort individual buckets
        for (let i = 0; i < numBuckets; i++) {
            buckets[i].sort((a, b) => a - b);
            steps.push({ arr: [...arr], line: 9, type: 'default', compare: [], pointers: { 'bucket': i }, log: `Sort bucket ${i}: [${buckets[i].join(', ')}]` });
        }

        // Concatenate back
        let idx = 0;
        for (let i = 0; i < numBuckets; i++) {
            for (let j = 0; j < buckets[i].length; j++) {
                arr[idx] = buckets[i][j];
                steps.push({ arr: [...arr], line: 13, type: 'swap', compare: [idx], pointers: { 'idx': idx, 'bucket': i }, log: `Retrieve ${buckets[i][j]} from bucket ${i} to index ${idx}` });
                idx++;
            }
        }
        steps.push({ arr: [...arr], line: 15, type: 'sorted-all', compare: [], pointers: {}, log: "Bucket Sort complete!" });
      }

      function recordCountingSteps(arr) {
        let n = arr.length;
        steps.push({ arr: [...arr], line: 0, type: 'default', compare: [], pointers: {}, log: "Initialize Counting Sort." });
        
        let max = Math.max(...arr, 0);
        steps.push({ arr: [...arr], line: 1, type: 'default', compare: [], pointers: {}, log: `Find maximum element in array: max = ${max}` });

        let count = new Array(max + 1).fill(0);
        steps.push({ arr: [...arr], line: 2, type: 'default', compare: [], pointers: {}, log: `Create count array of size ${max + 1}` });

        for (let i = 0; i < n; i++) {
            count[arr[i]]++;
            steps.push({ arr: [...arr], line: 3, type: 'compare', compare: [i], pointers: { 'i': i }, log: `Count occurrence of element ${arr[i]}: count[${arr[i]}] = ${count[arr[i]]}` });
        }

        let idx = 0;
        for (let i = 0; i <= max; i++) {
            if (count[i] > 0) {
                steps.push({ arr: [...arr], line: 5, type: 'default', compare: [], pointers: { 'val': i }, log: `Reconstruct: value ${i} has count ${count[i]}` });
                while (count[i] > 0) {
                    arr[idx] = i;
                    steps.push({ arr: [...arr], line: 7, type: 'swap', compare: [idx], pointers: { 'idx': idx, 'val': i }, log: `Place value ${i} at index ${idx}` });
                    idx++;
                    count[i]--;
                }
            }
        }
        steps.push({ arr: [...arr], line: 10, type: 'sorted-all', compare: [], pointers: {}, log: "Counting Sort complete!" });
      }

      // --- SEARCH STEP RECORDERS ---
      function recordLinearSearchSteps(arr) {
        let n = arr.length;
        steps.push({ arr: [...arr], line: 0, type: 'default', compare: [], pointers: {}, log: `Starting Linear Search. Target = ${searchTarget}` });
        steps.push({ arr: [...arr], line: 1, type: 'default', compare: [], pointers: {}, log: `Set variable n = ${n}` });

        let found = false;
        for (let i = 0; i < n; i++) {
            steps.push({ arr: [...arr], line: 2, type: 'default', compare: [], pointers: { 'i': i }, log: `Check loop variable i = ${i}` });
            steps.push({ arr: [...arr], line: 3, type: 'compare', compare: [i], pointers: { 'i': i }, log: `Comparing arr[i] (${arr[i]}) with target (${searchTarget})` });
            if (arr[i] === searchTarget) {
                steps.push({ arr: [...arr], line: 4, type: 'sorted', compare: [i], pointers: { 'i': i }, log: `Match Found! arr[i] matches target ${searchTarget} at index ${i}` });
                found = true;
                break;
            }
        }
        if (!found) {
            steps.push({ arr: [...arr], line: 7, type: 'default', compare: [], pointers: {}, log: `Loop complete. Target ${searchTarget} not found in array.` });
        }
      }

      function recordBinarySearchSteps(arr) {
        arr.sort((a,b) => a-b);
        let n = arr.length;
        steps.push({ arr: [...arr], line: 0, type: 'default', compare: [], pointers: {}, log: `Starting Binary Search. Target = ${searchTarget}` });
        
        let low = 0;
        steps.push({ arr: [...arr], line: 1, type: 'default', compare: [], pointers: { 'low': low }, log: `Set pointer low = 0` });
        let high = n - 1;
        steps.push({ arr: [...arr], line: 2, type: 'default', compare: [], pointers: { 'low': low, 'high': high }, log: `Set pointer high = ${high}` });

        let found = false;
        while (low <= high) {
            steps.push({ arr: [...arr], line: 3, type: 'default', compare: [], pointers: { 'low': low, 'high': high }, log: `Check while condition: low (${low}) <= high (${high})` });
            let mid = Math.floor(low + (high - low) / 2);
            steps.push({ arr: [...arr], line: 4, type: 'special', compare: [], pointers: { 'low': low, 'high': high, 'mid': mid }, log: `Compute middle index mid = ${mid} (value: ${arr[mid]})` });
            steps.push({ arr: [...arr], line: 5, type: 'compare', compare: [mid], pointers: { 'low': low, 'high': high, 'mid': mid }, log: `Compare arr[mid] (${arr[mid]}) with target (${searchTarget})` });

            if (arr[mid] === searchTarget) {
                steps.push({ arr: [...arr], line: 6, type: 'sorted', compare: [mid], pointers: { 'low': low, 'high': high, 'mid': mid }, log: `Match Found! mid element matches target at index ${mid}` });
                found = true;
                break;
            }
            if (arr[mid] < searchTarget) {
                low = mid + 1;
                steps.push({ arr: [...arr], line: 8, type: 'default', compare: [], pointers: { 'low': low, 'high': high }, log: `Since arr[mid] < target, shift low pointer to mid + 1 (${low})` });
            } else {
                high = mid - 1;
                steps.push({ arr: [...arr], line: 11, type: 'default', compare: [], pointers: { 'low': low, 'high': high }, log: `Since arr[mid] > target, shift high pointer to mid - 1 (${high})` });
            }
        }
        if (!found) {
            steps.push({ arr: [...arr], line: 14, type: 'default', compare: [], pointers: {}, log: "Pointers crossed. Target not found." });
        }
      }

      function recordStackSteps(arr) {
        steps.push({ arr: [...arr], line: 0, type: 'default', compare: [], pointers: {}, log: "Initialize Stack. Data structure operations are fully interactive." });
      }

      function recordQueueSteps(arr) {
        steps.push({ arr: [...arr], line: 0, type: 'default', compare: [], pointers: {}, log: "Initialize Queue. Data structure operations are fully interactive." });
      }

      // ==========================================
      // STATE RENDERING ENGINE
      // ==========================================
      function highlightCodeLine(lineIdx) {
        document.querySelectorAll('.code-line').forEach(el => el.classList.remove('line-active'));
        if (lineIdx !== null) {
          const targetLine = document.getElementById(`line-${lineIdx}`);
          if (targetLine) targetLine.classList.add('line-active');
        }
      }

      function renderStep(idx) {
        if (steps.length === 0) return;
        const step = steps[idx];
        currentStepIdx = idx;

        // Counter UI update
        stepCounter.innerText = `Step ${idx} / ${steps.length - 1}`;
        timelineSlider.value = idx;

        // Array raw string update
        stringArray.innerText = `${currentAlgo === 'stack' ? 'stack' : currentAlgo === 'queue' ? 'queue' : 'arr'} = [${step.arr.join(', ')}]`;

        // Render viewport elements
        const category = ALGORITHMS[currentAlgo].category;
        
        if (category === 'sorting') {
            renderSortingBars(step);
        } else if (category === 'searching') {
            renderSearchingBoxes(step);
        } else if (category === 'datastructures') {
            if (currentAlgo === 'stack') {
                renderStackView(step);
            } else {
                renderQueueView(step);
            }
        }

        // Highlight pseudo code line
        highlightCodeLine(step.line);

        // Add console log
        const logBox = document.getElementById('console-logs');
        logBox.innerHTML += `<div><span class="text-brand-orange font-bold font-mono">></span> ${step.log}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
      }

      function renderSortingBars(step) {
        viewportBars.className = "flex items-end justify-center space-x-3 sm:space-x-4 w-full h-[220px] px-4";
        const maxVal = Math.max(...data, 10);
        
        viewportBars.innerHTML = step.arr.map((val, index) => {
            let stateType = 'default';
            
            if (step.type === 'sorted-all') {
                stateType = 'sorted';
            } else if (step.compare.includes(index)) {
                if (step.type === 'swap') {
                    stateType = 'swap';
                } else {
                    stateType = 'compare';
                }
            } else {
                if (currentAlgo === 'bubble' && step.pointers.i !== undefined) {
                    if (index >= data.length - step.pointers.i) stateType = 'sorted';
                } else if (currentAlgo === 'selection' && step.pointers.i !== undefined) {
                    if (index < step.pointers.i) stateType = 'sorted';
                } else if (currentAlgo === 'insertion' && step.pointers.i !== undefined) {
                    if (index <= step.pointers.i) stateType = 'sorted';
                }
            }

            if (index === step.pointers['min'] || index === step.pointers['key']) {
                stateType = 'special';
            }

            // Synapse styling (Orange tinted bars default, Red for swap, Amber for comparisons)
            let bgClass = 'bg-brand-orange/20 border-brand-orange/40 text-neutral-300';
            if (stateType === 'compare') bgClass = 'bg-amber-500/25 border-amber-400 text-amber-300';
            if (stateType === 'swap') bgClass = 'bg-rose-500/35 border-rose-400 text-rose-300';
            if (stateType === 'sorted') bgClass = 'bg-emerald-500/20 border-emerald-400/50 text-emerald-300';
            if (stateType === 'special') bgClass = 'bg-purple-500/20 border-purple-400 text-purple-300';

            let stateClass = '';
            if (stateType === 'compare') stateClass = 'bar-compare';
            if (stateType === 'swap') stateClass = 'bar-swap';
            if (stateType === 'special') stateClass = 'bar-special';
            if (stateType === 'sorted') stateClass = 'bar-sorted';

            // Gather pointers
            let ptrLabel = '';
            let ptrs = [];
            for (let p in step.pointers) {
                if (step.pointers[p] === index) ptrs.push(p);
            }
            if (ptrs.length > 0) ptrLabel = ptrs.join(', ');

            const heightVal = Math.max((val / maxVal) * 190, 15);

            return `
                <div class="flex flex-col items-center flex-1 max-w-[56px] relative group pointer-transition">
                  <div style="height: ${heightVal}px;" class="w-full rounded-t-md border bar-transition ${bgClass} ${stateClass} flex items-start justify-center pt-2">
                    <span class="font-bold text-xs sm:text-sm drop-shadow">${val}</span>
                  </div>
                  <span class="mt-2 font-mono text-xs text-gray-500">${index}</span>
                  <div class="absolute -bottom-6 ${ptrLabel ? '' : 'hidden'} flex flex-col items-center pointer-transition">
                    <span class="text-amber-500 font-bold text-xs">↑</span>
                    <span class="text-amber-500 font-mono text-[9px] font-bold">${ptrLabel}</span>
                  </div>
                </div>
            `;
        }).join('');
      }

      function renderSearchingBoxes(step) {
        viewportBars.className = "flex items-center justify-center space-x-2 sm:space-x-3 w-full h-[220px] px-4";
        
        viewportBars.innerHTML = step.arr.map((val, index) => {
            let stateType = 'default';
            
            if (step.compare.includes(index)) {
                if (step.type === 'sorted') {
                    stateType = 'sorted';
                } else {
                    stateType = 'compare';
                }
            }

            if (step.pointers && step.pointers.low !== undefined && step.pointers.high !== undefined) {
                if (index < step.pointers.low || index > step.pointers.high) {
                    stateType = 'disabled';
                }
            }

            let bgClass = 'bg-[#161b22] border-gray-800 text-gray-200';
            if (stateType === 'compare') bgClass = 'bg-amber-950/60 border-amber-500 text-amber-300';
            if (stateType === 'sorted') bgClass = 'bg-emerald-950/60 border-emerald-500 text-emerald-300';
            if (stateType === 'disabled') bgClass = 'bg-neutral-950/20 border-neutral-900 text-neutral-600 border-dashed';

            // Gather pointers
            let ptrLabel = '';
            let ptrs = [];
            for (let p in step.pointers) {
                if (step.pointers[p] === index) ptrs.push(p);
            }
            if (ptrs.length > 0) ptrLabel = ptrs.join(', ');

            return `
                <div class="flex flex-col items-center flex-1 max-w-[50px] relative pointer-transition">
                  <div class="w-12 h-12 rounded-xl border flex items-center justify-center font-bold font-mono text-sm shadow-md transition-all duration-300 ${bgClass}">
                    <span>${val}</span>
                  </div>
                  <span class="mt-2 font-mono text-xs text-gray-500">${index}</span>
                  <div class="absolute -bottom-6 ${ptrLabel ? '' : 'hidden'} flex flex-col items-center pointer-transition">
                    <span class="text-amber-500 font-bold text-xs">↑</span>
                    <span class="text-amber-500 font-mono text-[9px] font-bold">${ptrLabel}</span>
                  </div>
                </div>
            `;
        }).join('');
      }

      function renderStackView(step) {
        viewportBars.className = "flex flex-col-reverse items-center justify-start space-y-reverse space-y-2 w-full h-[220px] overflow-y-auto px-4";
        
        let elementsHtml = step.arr.map((val, index) => {
            const isTop = (index === step.arr.length - 1);
            let bgClass = isTop ? 'bg-brand-orange/20 border-brand-orange/50 text-brand-orange font-bold' : 'bg-[#161b22] border-gray-800 text-gray-200';
            let animationClass = isTop ? 'animate-slide-down' : '';
            
            return `
                <div class="w-full max-w-[200px] py-2 rounded-lg border text-center font-bold font-mono text-xs flex items-center justify-between px-4 shadow ${bgClass} ${animationClass}">
                    <span>${val}</span>
                    <span class="text-[9px] text-neutral-500 font-mono uppercase">${isTop ? 'Top' : index}</span>
                </div>
            `;
        }).join('');

        if (step.arr.length === 0) {
            elementsHtml = `<div class="text-xs text-neutral-600 font-mono uppercase tracking-wider py-8">Stack Empty</div>`;
        }

        viewportBars.innerHTML = `
            <div class="w-full max-w-[220px] border-b-4 border-x-2 border-gray-800 bg-[#0d1117]/30 p-2.5 rounded-b-xl flex flex-col-reverse gap-2 min-h-[190px]">
                ${elementsHtml}
            </div>
        `;
      }

      function renderQueueView(step) {
        viewportBars.className = "flex items-center justify-center w-full h-[220px] px-4";
        
        let elementsHtml = step.arr.map((val, index) => {
            let ptrName = '';
            if (index === 0) ptrName = 'Front';
            if (index === step.arr.length - 1) ptrName = ptrName === 'Front' ? 'F & R' : 'Rear';

            let bgClass = ptrName ? 'bg-brand-orange/20 border-brand-orange/50 text-brand-orange font-bold' : 'bg-[#161b22] border-gray-800 text-gray-200';
            const isRear = (index === step.arr.length - 1);
            let animationClass = isRear ? 'animate-slide-right' : '';

            return `
                <div class="w-12 h-12 rounded-xl border flex flex-col items-center justify-center font-bold font-mono text-xs shadow-md ${bgClass} ${animationClass}">
                    <span class="text-sm">${val}</span>
                    <span class="text-[8px] text-neutral-500 font-mono uppercase mt-0.5">${ptrName || index}</span>
                </div>
            `;
        }).join('');

        if (step.arr.length === 0) {
            elementsHtml = `<div class="text-xs text-neutral-600 font-mono uppercase tracking-wider">Queue Empty</div>`;
        }

        viewportBars.innerHTML = `
            <div class="w-full max-w-lg border-y-2 border-gray-800 bg-[#0d1117]/30 p-4 rounded-xl flex items-center justify-center gap-2 min-h-[90px]">
                ${elementsHtml}
            </div>
        `;
      }

      // ==========================================
      // PLAYBACK PLAY / TIMELINE CONTROL LOGIC
      // ==========================================
      function togglePlayPause() {
        if (isPlaying) {
            pause();
        } else {
            play();
        }
      }

      function play() {
        if (currentStepIdx >= steps.length - 1) {
            currentStepIdx = 0; 
        }
        isPlaying = true;
        btnPlay.classList.replace('bg-brand-orange', 'bg-white');
        playIcon.className = "fa-solid fa-pause text-black";

        playbackInterval = setInterval(() => {
            if (currentStepIdx < steps.length - 1) {
                currentStepIdx++;
                renderStep(currentStepIdx);
            } else {
                pause();
            }
        }, stepDelay);
      }

      function pause() {
        isPlaying = false;
        if (playbackInterval) {
            clearInterval(playbackInterval);
            playbackInterval = null;
        }
        btnPlay.classList.replace('bg-white', 'bg-brand-orange');
        playIcon.className = "fa-solid fa-play text-black ml-0.5";
      }

      function stepForward() {
        pause();
        if (currentStepIdx < steps.length - 1) {
            currentStepIdx++;
            renderStep(currentStepIdx);
        }
      }

      function stepBackward() {
        pause();
        if (currentStepIdx > 0) {
            currentStepIdx--;
            renderStep(currentStepIdx);
        }
      }

      function forceReset() {
        pause();
        currentStepIdx = 0;
        document.getElementById('console-logs').innerHTML = `<div class="text-neutral-500">> Visualizer reset to initial step. Ready.</div>`;
        renderStep(0);
      }

      function scrubTimeline(idx) {
        pause();
        renderStep(idx);
      }

      function changeSpeed() {
        stepDelay = parseInt(speedSelect.value);
        if (isPlaying) {
            pause();
            play();
        }
      }

      // ==========================================
      // INPUT PRESETS MANAGEMENT
      // ==========================================
      function loadPreset(presetKey) {
        pause();
        data = [...PRESETS[presetKey]];
        
        // Highlight active preset styling
        const presets = ['standard', 'small', 'reverse', 'sorted', 'nearly', 'equal'];
        presets.forEach(key => {
            const btn = document.getElementById(`preset-${key}`);
            if (btn) {
                if (key === presetKey) {
                    btn.className = "px-2.5 py-1.5 rounded bg-neutral-900 border border-gray-800 text-brand-orange font-bold shadow transition-all cursor-pointer";
                } else {
                    btn.className = "px-2.5 py-1.5 rounded bg-[#161b22] hover:bg-neutral-900 border border-gray-800 text-neutral-300 transition-all cursor-pointer";
                }
            }
        });

        // Hide custom elements
        customArrInput.classList.add('hidden');
        customArrApply.classList.add('hidden');

        // Auto-sort presets for binary search
        if (currentAlgo === 'binary') {
            data.sort((a,b) => a-b);
        }

        document.getElementById('console-logs').innerHTML = `<div><span class="text-brand-orange font-bold font-mono">></span> Loaded preset dataset: ${presetKey}</div>`;
        generateAnimationSteps();
        renderStep(0);
      }

      function toggleCustomInput() {
        customArrInput.classList.toggle('hidden');
        customArrApply.classList.toggle('hidden');
        customArrInput.focus();
      }

      function applyCustomInput() {
        pause();
        const raw = customArrInput.value;
        const parsed = raw.split(',')
                          .map(v => parseInt(v.trim()))
                          .filter(v => !isNaN(v) && v > 0);
        
        if (parsed.length === 0) {
            alert("Please enter a valid list of comma-separated positive numbers!");
            return;
        }

        // Limit length to keep bar rendering aligned
        data = parsed.slice(0, 10);
        
        // Clear highlights in presets
        const presets = ['standard', 'small', 'reverse', 'sorted', 'nearly', 'equal'];
        presets.forEach(key => {
            const btn = document.getElementById(`preset-${key}`);
            if (btn) {
                btn.className = "px-2.5 py-1.5 rounded bg-[#161b22] hover:bg-neutral-900 border border-gray-800 text-neutral-300 transition-all cursor-pointer";
            }
        });

        // Auto-sort custom input for binary search
        if (currentAlgo === 'binary') {
            data.sort((a,b) => a-b);
            customArrInput.value = data.join(', ');
        }

        document.getElementById('console-logs').innerHTML = `<div><span class="text-brand-orange font-bold font-mono">></span> Loaded custom data: [${data.join(', ')}]</div>`;
        generateAnimationSteps();
        renderStep(0);
      }

      function changeSearchTarget() {
        searchTarget = parseInt(document.getElementById('search-target-val').value) || 34;
        document.getElementById('console-logs').innerHTML = `<div><span class="text-brand-orange font-bold font-mono">></span> Changed search target to ${searchTarget}</div>`;
        generateAnimationSteps();
        renderStep(0);
      }

      // ==========================================
      // DATA STRUCTURE ACTIONS (STACK / QUEUE)
      // ==========================================
      function triggerDSPush() {
        pause();
        const val = parseInt(dsValBox.value);
        if (isNaN(val)) {
            alert("Please enter a valid number!");
            return;
        }
        if (dsElements.length >= 8) {
            alert("Buffer limit reached (Max 8 nodes to maintain visuals)!");
            return;
        }

        if (currentAlgo === 'stack') {
            dsElements.push(val);
            steps.push({
                arr: [...dsElements],
                line: 3, // push method
                type: 'special',
                compare: [dsElements.length - 1],
                pointers: {},
                log: `Pushed new value ${val} on top of stack.`
            });
        } else {
            dsElements.push(val);
            steps.push({
                arr: [...dsElements],
                line: 3, // enqueue method
                type: 'special',
                compare: [dsElements.length - 1],
                pointers: {},
                log: `Enqueued new value ${val} at rear of queue.`
            });
        }

        dsValBox.value = '';
        generateAnimationSteps();
        renderStep(steps.length - 1);
      }

      function triggerDSPop() {
        pause();
        if (dsElements.length === 0) {
            alert("Underflow error! Structure is empty.");
            return;
        }

        if (currentAlgo === 'stack') {
            const popped = dsElements[dsElements.length - 1];
            steps.push({
                arr: [...dsElements],
                line: 7, // pop method
                type: 'compare',
                compare: [dsElements.length - 1],
                pointers: {},
                log: `Popping top element (${popped}) from stack.`
            });
            currentStepIdx = steps.length - 1;
            renderStep(currentStepIdx);

            setTimeout(() => {
                dsElements.pop();
                steps.push({
                    arr: [...dsElements],
                    line: 9,
                    type: 'default',
                    compare: [],
                    pointers: {},
                    log: `Popped top element (${popped}) successfully. Stack size is now ${dsElements.length}.`
                });
                generateAnimationSteps();
                renderStep(steps.length - 1);
            }, 600);

        } else {
            const dequeued = dsElements[0];
            steps.push({
                arr: [...dsElements],
                line: 7, // dequeue method
                type: 'compare',
                compare: [0],
                pointers: {},
                log: `Dequeuing front element (${dequeued}) from queue.`
            });
            currentStepIdx = steps.length - 1;
            renderStep(currentStepIdx);

            setTimeout(() => {
                dsElements.shift();
                steps.push({
                    arr: [...dsElements],
                    line: 9,
                    type: 'default',
                    compare: [],
                    pointers: {},
                    log: `Dequeued front element (${dequeued}) successfully. Queue size is now ${dsElements.length}.`
                });
                generateAnimationSteps();
                renderStep(steps.length - 1);
            }, 600);
        }
      }

      // ==========================================
      // ALGORITHM SWITCHES
      // ==========================================
      function switchAlgo(algoKey) {
        if (currentAlgo === algoKey) return;
        pause();

        currentAlgo = algoKey;
        renderTabsGroup();
        renderCodeStructure();
        adjustToolbarPanels();
        
        document.getElementById('console-logs').innerHTML = `<div><span class="text-brand-orange font-bold font-mono">></span> Switched algorithm to: ${ALGORITHMS[algoKey].name}</div>`;
        generateAnimationSteps();
        renderStep(0);
      }

      // ==========================================
      // FULL SCREEN UTILS
      // ==========================================
      function toggleFullscreen() {
        const doc = document.documentElement;
        if (!document.fullscreenElement) {
          doc.requestFullscreen().catch(err => {
            console.warn(`Fullscreen error: ${err.message}`);
          });
        } else {
          document.exitFullscreen();
        }
      }

      // ==========================================
      // HELPERS
      // ==========================================
      function escapeHTML(str) {
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
      }

      // Sync Navbar Auth State
      function syncNavbarAuth() {
          const token = localStorage.getItem("synapse_token");
          const userStr = localStorage.getItem("synapse_user");
          const container = document.getElementById("nav-auth-container");
          
          if (token && userStr && container) {
              try {
                  const user = JSON.parse(userStr);
                  const initials = user.name ? user.name.split(" ").map(n => n.charAt(0)).join("").toUpperCase().slice(0, 2) : "U";
                  container.innerHTML = `
                      <div class="flex items-center gap-3">
                          <div onclick="window.location.href='analytics.html'" class="w-8 h-8 rounded-full bg-brand-orange/20 border border-brand-orange/40 hover:border-brand-orange hover:bg-brand-orange/35 flex items-center justify-center text-brand-orange text-xs font-bold font-mono cursor-pointer transition-all" title="View Profile">
                              ${initials}
                          </div>
                          <span onclick="window.location.href='analytics.html'" class="text-xs text-neutral-300 hover:text-white font-semibold hidden sm:inline cursor-pointer transition-all" title="View Profile">${user.name || 'User'}</span>
                          <button onclick="handleLogout()" class="text-xs font-semibold px-3 py-1.5 border border-brand-border rounded-lg text-neutral-400 hover:text-white hover:border-neutral-500 transition-all cursor-pointer">
                              Log Out
                          </button>
                      </div>
                      <a href="dsa-visualizer-menu.html" class="text-xs font-semibold px-4 py-2 border border-brand-border rounded-lg text-neutral-300 hover:text-white hover:border-neutral-500 transition-all">
                          <i class="fa-solid fa-arrow-left mr-1"></i> Back to Animations Dashboard
                      </a>
                  `;
              } catch (e) {
                  console.error("Auth sync error:", e);
              }
          }
      }

      function handleLogout() {
          localStorage.removeItem("synapse_token");
          localStorage.removeItem("synapse_user");
          window.location.reload();
      }

      // ==========================================
      // DYNAMIC NEURAL CANVAS BACKGROUND (SYNAPSE)
      // ==========================================
      const canvas = document.getElementById('canvas-synapse');
      const ctx = canvas.getContext('2d');
      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;

      const particles = [];
      const particleCount = 65;
      let mouse = { x: null, y: null, active: false };
      let glowX = width / 2;
      let glowY = height / 2;

      window.addEventListener('mousemove', (e) => {
          mouse.x = e.clientX;
          mouse.y = e.clientY;
          mouse.active = true;
      });

      window.addEventListener('mouseleave', () => {
          mouse.active = false;
      });

      window.addEventListener('resize', () => {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
      });

      class Particle {
          constructor() {
              this.x = Math.random() * width;
              this.y = Math.random() * height;
              this.vx = (Math.random() - 0.5) * 0.55;
              this.vy = (Math.random() - 0.5) * 0.55;
              this.radius = Math.random() * 2.2 + 1;
          }

          update() {
              this.x += this.vx;
              this.y += this.vy;

              if (mouse.active) {
                  const dx = mouse.x - this.x;
                  const dy = mouse.y - this.y;
                  const distance = Math.hypot(dx, dy);
                  if (distance < 170) {
                      const force = (170 - distance) / 170;
                      const angle = Math.atan2(dy, dx);
                      this.x -= Math.cos(angle) * force * 2.0;
                      this.y -= Math.sin(angle) * force * 2.0;
                  }
              }

              if (this.x < 0 || this.x > width) this.vx = -this.vx;
              if (this.y < 0 || this.y > height) this.vy = -this.vy;
          }

          draw() {
              ctx.beginPath();
              ctx.arc(this.x, this.y, this.radius * 3.5, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(201, 123, 61, 0.28)`; // Orange glow
              ctx.fill();

              ctx.beginPath();
              ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
              ctx.fillStyle = `#FFFFFF`;
              ctx.fill();
          }
      }

      for (let i = 0; i < particleCount; i++) {
          particles.push(new Particle());
      }

      function animate() {
          ctx.clearRect(0, 0, width, height);

          const glow1 = document.getElementById('glow-1');
          if (glow1) {
              let targetX = mouse.active ? mouse.x : width / 2;
              let targetY = mouse.active ? mouse.y : height / 2;
              glowX += (targetX - glowX) * 0.04;
              glowY += (targetY - glowY) * 0.04;
              glow1.style.left = `${glowX - 300}px`;
              glow1.style.top = `${glowY - 300}px`;
          }

          for (let i = 0; i < particles.length; i++) {
              particles[i].update();
              particles[i].draw();

              for (let j = i + 1; j < particles.length; j++) {
                  const dist = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                  if (dist < 125) {
                      const alpha = (1 - dist / 125) * 0.55;
                      ctx.beginPath();
                      ctx.moveTo(particles[i].x, particles[i].y);
                      ctx.lineTo(particles[j].x, particles[j].y);
                      ctx.strokeStyle = `rgba(201, 123, 61, ${alpha * 0.35})`;
                      ctx.lineWidth = 3.5;
                      ctx.stroke();

                      ctx.beginPath();
                      ctx.moveTo(particles[i].x, particles[i].y);
                      ctx.lineTo(particles[j].x, particles[j].y);
                      ctx.strokeStyle = `rgba(201, 123, 61, ${alpha})`;
                      ctx.lineWidth = 1.0;
                      ctx.stroke();
                  }
              }

              if (mouse.active) {
                  const distToMouse = Math.hypot(particles[i].x - mouse.x, particles[i].y - mouse.y);
                  if (distToMouse < 170) {
                      const alpha = (1 - distToMouse / 170) * 0.75;
                      ctx.beginPath();
                      ctx.moveTo(particles[i].x, particles[i].y);
                      ctx.lineTo(mouse.x, mouse.y);
                      ctx.strokeStyle = `rgba(201, 123, 61, ${alpha * 0.35})`;
                      ctx.lineWidth = 5.0;
                      ctx.stroke();

                      ctx.beginPath();
                      ctx.moveTo(particles[i].x, particles[i].y);
                      ctx.lineTo(mouse.x, mouse.y);
                      ctx.strokeStyle = `rgba(201, 123, 61, ${alpha})`;
                      ctx.lineWidth = 1.5;
                      ctx.stroke();
                  }
              }
          }
          requestAnimationFrame(animate);
      }
      animate();

      // Launch visualizer
      init();
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyForge AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="static/css/style.css"/>
</head>
<body>
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="section-label">POMODORO FOCUS</div>
        <div class="pomo-ring" id="pomoRing">
          <span id="pomoTime">25:00</span>
        </div>
        <div class="pomo-btns">
          <button onclick="pomoStart()">▶</button>
          <button onclick="pomoPause()">⏸</button>
          <button onclick="pomoReset()">↺</button>
        </div>
        <div class="pomo-info">Sessions: <span id="pomoSessions">0</span></div>
      </div>

      <div class="timetable-panel">
        <div class="section-label">STUDY PROFILE</div>
        <div id="profileHud" class="profile-hud">
          <div class="profile-placeholder">Chat with the AI to build your smart study profile.</div>
        </div>

        <div class="section-label" style="margin-top: 24px;">YOUR PLAN</div>
        <div id="ttSlots">
          <p class="empty-msg">Chat with the AI to generate your personalized study roadmap.</p>
        </div>
      </div>
    </aside>

    <!-- MAIN CHAT -->
    <main class="chat-area">
      <header class="chat-header">
        <span class="logo">Study<span>Forge</span> AI</span>
        <span class="header-sub">Powered by HuggingFace · Flask</span>
        <div style="margin-left: auto; display: flex; align-items: center; gap: 12px;">
          <a href="features.html" class="exit-btn" style="font-size: 11px; font-weight: 600; color: #888899; text-decoration: none; border: 1px solid rgba(255,255,255,0.07); padding: 6px 12px; border-radius: 6px; transition: 0.2s;" onmouseover="this.style.color='white'; this.style.borderColor='rgba(255,255,255,0.15)'" onmouseout="this.style.color='#888899'; this.style.borderColor='rgba(255,255,255,0.07)'">
            <i class="fa-solid fa-arrow-left-long" style="margin-right: 4px;"></i> Return to Sandbox
          </a>
          <span class="status-dot" id="statusDot" style="margin-left: 0;"></span>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <div class="input-bar">
        <textarea
          id="userInput"
          placeholder="Tell me your subjects, exam dates, deadlines..."
          rows="1"
        ></textarea>
        <button id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </main>

  </div>

  <script src="static/js/app.js"></script>
</body>
</html>

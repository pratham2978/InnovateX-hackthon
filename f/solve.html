<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNAPSE — Solve Problem IDE</title>
    <!-- Tailwind CSS v4 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Monaco Editor CSS & Loaders -->
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/editor/editor.main.min.css">
    
    <style type="text/tailwindcss">
        @theme {
            --color-brand-bg: #0A0A0A;
            --color-brand-card: #111111;
            --color-brand-text: #F5F5F5;
            --color-brand-red: #D90429;
            --color-brand-red-light: #E63946;
            --color-brand-orange: #C97B3D;
            --color-brand-orange-light: #D08B4E;
            --color-brand-border: #222222;
            
            --font-display: 'Plus Jakarta Sans', sans-serif;
            --font-sans: 'Inter', sans-serif;
        }
    </style>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #F5F5F5;
            overflow: hidden;
        }

        .ide-layout {
            display: flex;
            height: calc(100vh - 76px);
            background: #0A0A0A;
            color: #F5F5F5;
        }
        
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #222222;
        }

        /* Description Side */
        .desc-panel {
            padding: 24px;
            overflow-y: auto;
            background: rgba(13,13,13,0.5);
            backdrop-filter: blur(20px);
        }
        
        .desc-header { margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 16px; }
        .desc-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .desc-content p { color: #cbd5e1; line-height: 1.6; margin-bottom: 16px; font-size: 0.9rem; }
        .desc-content pre { background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px; font-family: 'Fira Code', monospace; font-size: 0.8rem; color: #D08B4E; border: 1px solid rgba(255,255,255,0.04); margin-bottom: 16px; }

        /* Code Side */
        .code-panel {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #111111;
            border-bottom: 1px solid #222222;
        }

        .code-lang-selector {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            font-weight: 600;
        }

        .code-actions { display: flex; gap: 8px; }
        .btn-run { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 6px 16px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; display:flex; align-items:center; gap:6px; transition: 0.2s; }
        .btn-run:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.2); }
        .btn-submit { background: #C97B3D; color: #000; border: none; padding: 6px 16px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; display:flex; align-items:center; gap:6px; transition: 0.2s; }
        .btn-submit:hover { background: #D08B4E; }

        .editor-container { flex: 1; position: relative; }
        #monaco-editor { position: absolute; top:0; left:0; right:0; bottom:0; }

        /* Terminal Window */
        .terminal-panel {
            height: 250px;
            background: #111111;
            border-top: 1px solid #C97B3D;
            display: flex;
            flex-direction: column;
        }
        
        .terminal-header {
            display: flex;
            justify-content: space-between;
            background: #151515;
            padding: 10px 18px;
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 700;
            border-bottom: 1px solid #222222;
        }
        
        .terminal-body {
            flex: 1;
            padding: 14px;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #f8fafc;
            overflow-y: auto;
            white-space: pre-wrap;
            background: #0d0d0d;
        }
        
        .status-badge { padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .status-success { color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .status-error { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .status-idle { color: #94a3b8; background: rgba(255,255,255,0.05); }

        /* Grid background pattern */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: -30;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>

    <nav class="sticky top-0 z-50 w-full px-6 py-4 border-b border-brand-border bg-brand-bg/60 backdrop-blur-md flex items-center justify-between" style="height: 76px; box-sizing: border-box;">
        <div class="flex items-center gap-3 group cursor-pointer" onclick="window.location.href='index.html'">
            <span class="text-xl font-bold tracking-wider text-white brand-font">SYNAPSE</span>
        </div>
        <div class="flex items-center gap-8 text-sm font-medium text-neutral-400">
            <a href="index.html" class="hover:text-white transition-colors">Home</a>
            <a href="features.html" class="hover:text-white transition-colors">Features</a>
                <a href="global-ranking.html" class="hover:text-white transition-colors">Global Ranking</a>
        </div>
        <div style="color: #94a3b8; font-size: 0.8rem; font-family: 'Fira Code', monospace; display: flex; align-items: center; gap: 8px;" id="nav-user-email">
            <i class="fa-solid fa-user-circle text-sm"></i> user@synapse.com
        </div>
    </nav>
    <!-- Auth Guard: redirect to login if not authenticated -->
    <script src="js/auth-guard.js"></script>


    <div class="ide-layout">
        <!-- Left: Problem Description -->
        <div class="panel desc-panel">
            <div class="desc-header">
                <h1 class="desc-title" id="q-title">Loading Problem Name...</h1>
                <div class="desc-tags flex gap-2">
                    <span class="badge easy text-xs font-bold px-2 py-0.5 rounded" style="background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2);">Easy</span>
                    <span class="badge text-xs font-bold px-2 py-0.5 rounded" style="background: rgba(255, 255, 255, 0.05); color: #cbd5e1;">Array</span>
                </div>
            </div>
            
            <div class="desc-content" id="desc-content">
                ...
            </div>
            
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="getHint()" style="background: rgba(201, 123, 61, 0.1); color: #D08B4E; border: 1px solid rgba(201, 123, 61, 0.3); padding: 8px 16px; border-radius: 6px; cursor: pointer; display: flex; align-items:center; gap:8px; font-weight:600; transition: 0.2s; font-size: 0.85rem;" onmouseover="this.style.background='rgba(201,123,61,0.2)'" onmouseout="this.style.background='rgba(201,123,61,0.1)'"><i class="fa-solid fa-lightbulb"></i> AI Hint</button>
            </div>
            
            <div id="ai-analysis-output" style="margin-top: 24px;"></div>
        </div>

        <!-- Right: Code Editor & Terminal -->
        <div class="panel code-panel">
            <div class="code-header">
                <select class="code-lang-selector" id="lang-selector" onchange="changeLanguage()">
                    <option value="java">Java 17</option>
                    <option value="python">Python 3</option>
                    <option value="cpp">C++</option>
                </select>
                <div class="code-actions">
                    <button class="btn-run" onclick="analyzeComplexity()" style="background: rgba(167, 139, 250, 0.1); color: #c4b5fd; border: 1px solid rgba(167, 139, 250, 0.2);"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Complexity</button>
                    <button class="btn-run" onclick="runCode()"><i class="fa-solid fa-play"></i> Run Code</button>
                    <button class="btn-submit" onclick="submitCode()"><i class="fa-solid fa-cloud-arrow-up"></i> Submit to Database</button>
                </div>
            </div>
            
            <div class="editor-container">
                <div id="monaco-editor"></div>
            </div>

            <div class="terminal-panel">
                <div class="terminal-header">
                    <span>Console Output</span>
                    <span id="terminal-status" class="status-badge status-idle">Ready</span>
                </div>
                <div class="terminal-body" id="terminal-out">> Write your code and press Run to compile via the Spring Boot Server!</div>
            </div>
        </div>
    </div>

    <script src="js/descriptions.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Setup Problem Title from URL
        const urlParams = new URLSearchParams(window.location.search);
        const qName = urlParams.get('q') || 'Two Sum';
        document.getElementById('q-title').innerText = qName;

        // Dynamic Descriptions
        const fallbackDesc = `Write an optimal Java solution for the problem <strong>${qName}</strong>. Ensure you handle all edge cases.<br><br>Your class must be named <strong>Main</strong> with a <code>public static void main(String[] args)</code> entrypoint to successfully execute.`;

        const descHTML = window.problemDescriptions && window.problemDescriptions[qName] ? window.problemDescriptions[qName] : fallbackDesc;
        
        document.getElementById('desc-content').innerHTML = `
            <p style="color: #cbd5e1; line-height: 1.6; margin-bottom: 24px; font-size: 0.95rem;">${descHTML}</p>
            <div style="background: rgba(201, 123, 61, 0.05); border: 1px solid rgba(201, 123, 61, 0.15); padding: 12px; border-radius: 8px; font-size: 0.85rem; color: #fdba74;">
                <i class="fa-solid fa-circle-info"></i> Note: CodePrep uses Spring Boot to compile code natively. Ensure you use <code>System.out.println()</code> to print your final output!
            </div>
        `;

        // Sync local user email
        const localUser = localStorage.getItem("synapse_user");
        if (localUser) {
            try {
                const u = JSON.parse(localUser);
                if (u && u.email) {
                    document.getElementById("nav-user-email").innerHTML = `<i class="fa-solid fa-user-circle text-sm"></i> ${u.email}`;
                }
            } catch(e) {}
        }

        // Initialize Monaco Editor
        let editor;
        
        const boilerplates = {
            'java': [
                'public class Main {',
                '    public static void main(String[] args) {',
                '        System.out.println("Hello from CodePrep Compiler!");',
                '        // Write your solution for: ' + qName,
                '    }',
                '}'
            ].join('\n'),
            'python': [
                'def solve():',
                '    print("Hello from CodePrep Compiler!")',
                '    # Write your solution for: ' + qName,
                '',
                'if __name__ == "__main__":',
                '    solve()'
            ].join('\n'),
            'cpp': [
                '#include <iostream>',
                'using namespace std;',
                '',
                'int main() {',
                '    cout << "Hello from CodePrep Compiler!\\n";',
                '    // Write your solution for: ' + qName,
                '    return 0;',
                '}'
            ].join('\n')
        };

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: boilerplates['java'],
                language: 'java',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                minimap: { enabled: false }
            });
        });

        function changeLanguage() {
            const lang = document.getElementById('lang-selector').value;
            const model = editor.getModel();
            
            let monacoLang = lang;
            
            monaco.editor.setModelLanguage(model, monacoLang);
            editor.setValue(boilerplates[lang]);
        }

        // Communication to Spring Boot Backend API
        async function executeCodeOnServer(submitMode) {
            const terminal = document.getElementById('terminal-out');
            const statusBadge = document.getElementById('terminal-status');
            
            const code = editor.getValue();
            const lang = document.getElementById('lang-selector').value;
            
            terminal.innerText = "Compiling and Executing via Spring Boot backend...\nPlease wait...";
            statusBadge.className = 'status-badge status-idle';
            statusBadge.innerText = 'Compiling...';

            try {
                const backendUrl = (() => {
                    const { protocol, hostname, port, origin } = window.location;
                    const isLocal = protocol === 'file:' || hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '[::1]' || hostname.startsWith('192.168.') || hostname.startsWith('10.') || hostname.startsWith('172.');
                    return isLocal ? (port === '5000' ? origin : `http://${hostname === 'localhost' || hostname === '[::1]' || protocol === 'file:' ? '127.0.0.1' : hostname}:5000`) : origin;
                })();

                const response = await fetch(`${backendUrl}/api/run-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: code,
                        language: lang
                    })
                });

                if (!response.ok) {
                    throw new Error("Cannot connect to compilation server. Make sure the Node server is running!");
                }

                const result = await response.json();
                
                // Map Express run-code response to the structure solve.html expects
                const data = {
                    status: result.success ? 'Success' : 'Failed',
                    output: result.output,
                    id: Math.floor(Math.random() * 1000)
                };
                
                terminal.innerText = data.output || "(No output)";
                statusBadge.innerText = data.status;

                if (data.status.includes('Success')) {
                    statusBadge.className = 'status-badge status-success';
                    if (submitMode) {
                        terminal.innerText += "\n\n[SUCCESS] Saved submission entry #" + data.id + " to MySQL Database successfully!";
                        
                        // Fire Confetti!
                        var duration = 3000;
                        var end = Date.now() + duration;
                        (function frame() {
                            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#C97B3D', '#fbbf24', '#ff7300'] });
                            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#C97B3D', '#fbbf24', '#ff7300'] });
                            if (Date.now() < end) requestAnimationFrame(frame);
                        }());
                    }
                } else {
                    statusBadge.className = 'status-badge status-error';
                    if (submitMode) {
                        terminal.innerText += "\n\n[INFO] Saving failed attempt entry #" + data.id + " to MySQL Database for analytics.";
                    }
                }

            } catch(e) {
                terminal.innerText = "Error trying to connect to backend.\n\n" + e.message;
                statusBadge.className = 'status-badge status-error';
                statusBadge.innerText = 'Connection Error';
            }
        }

        function runCode() {
            executeCodeOnServer(false);
        }

        function submitCode() {
            executeCodeOnServer(true);
        }

        function analyzeComplexity() {
            const terminal = document.getElementById('terminal-out');
            const statusBadge = document.getElementById('terminal-status');
            const code = editor.getValue();
            
            terminal.innerText = "Initializing AI AST Parser...\nScanning code blocks for loops, recursions, and data structures...\n[##################  ] 90%";
            statusBadge.className = 'status-badge status-idle';
            statusBadge.innerText = 'Analyzing...';
            
            setTimeout(() => {
                let time = "O(1)";
                let space = "O(1)";
                let explanation = "Code executes in constant time with minimal state modifications.";
                
                if (code.match(/for[\s]*\(.*\{[\s\S]*for[\s]*\(/) || code.match(/while[\s]*\(.*\{[\s\S]*while[\s]*\(/)) {
                    time = "O(N²)";
                    explanation = "Nested loops detected. This algorithm scales quadratically with respect to input. Heavy performance penalties on large datasets.";
                } else if (code.match(/for[\s]*\(/) || code.match(/while[\s]*\(/)) {
                    time = "O(N)";
                    explanation = "A single linear loop detected. Time complexity scales proportionally with the data input size.";
                } else if (code.includes("mergeSort") || code.includes("quickSort")) {
                    time = "O(N log N)";
                    explanation = "Recursive divide-and-conquer strategy detected. Efficient for large datasets.";
                }
                
                if (code.match(/new[\s]+(int|double|float|String|long)[\s]*\[[a-zA-Z0-9_]+\]\[/)) {
                    space = "O(N²)";
                } else if (code.match(/new[\s]+[A-Za-z0-9_]+[\s]*\[/) || code.includes("ArrayList") || code.includes("HashMap")) {
                    space = "O(N)";
                }
                
                terminal.innerText = "AI Analysis computed. Check the left description panel for results.";
                
                const leftPanel = document.getElementById('ai-analysis-output');
                leftPanel.innerHTML = `
                <div style="background: rgba(201, 123, 61, 0.03); border: 1px solid rgba(201, 123, 61, 0.2); border-radius: 12px; padding: 20px; animation: fadeIn 0.5s;">
                    <div style="color: #D08B4E; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; font-size: 1.1rem;">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> AI Algorithm Analysis
                    </div>
                    <div style="display: flex; gap: 16px; margin-bottom: 16px;">
                        <div style="flex:1; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                            <div style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 4px;"><i class="fa-regular fa-clock"></i> Time Complexity</div>
                            <div style="font-family: 'Fira Code', monospace; color: #fff; font-size: 1.2rem;">${time}</div>
                        </div>
                        <div style="flex:1; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                            <div style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 4px;"><i class="fa-solid fa-memory"></i> Space Complexity</div>
                            <div style="font-family: 'Fira Code', monospace; color: #fff; font-size: 1.2rem;">${space}</div>
                        </div>
                    </div>
                    <div style="color: #cbd5e1; font-size: 0.85rem; line-height: 1.6; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 12px;">
                        <strong>Remarks:</strong> ${explanation}
                    </div>
                </div>
                `;
                
                statusBadge.className = 'status-badge status-success';
                statusBadge.innerText = 'Analysis Ready';
            }, 1200);
        }

        function getHint() {
            const hints = {
                'Two Sum': "AI Hint: Have you considered using a HashMap to store the numbers you've seen so far? This reduces the time complexity from nested loops O(N²) to a single pass O(N)!",
                'Implement Stack using Arrays': "AI Hint: Keep track of an integer pointer 'top' initialized to -1. When pushing, increment 'top' and insert at index. When popping, return array[top] and decrement.",
                'Container With Most Water': "AI Hint: This problem begs for a Two-Pointer approach! Place one pointer at the beginning and one at the end. Always move the pointer that is pointing to the shorter line inward.",
                'default': "AI Hint: Before writing the actual logic, write pseudo-code in comments. Break down the edge cases explicitly, such as what happens if the array is empty or input is zero."
            };
            const hintMsg = hints[qName] || hints['default'];
            
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:rgba(15,23,42,0.9); backdrop-filter:blur(10px); color:#D08B4E; border:1px solid rgba(201,123,61,0.5); padding:16px 24px; border-radius:12px; font-weight:500; font-size:0.95rem; z-index:9999; box-shadow:0 10px 30px rgba(0,0,0,0.5); animation:fadeIn 0.3s ease-out; display:flex; align-items:center; gap:12px;';
            toast.innerHTML = `<i class="fa-solid fa-robot" style="font-size:1.5rem;"></i> <div>${hintMsg}</div>`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease-in';
                setTimeout(() => toast.remove(), 300);
            }, 6000);
        }
    </script>
    <style>
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px) translateX(-50%); } to { opacity:1; transform:translateY(0) translateX(-50%); } }
        @keyframes fadeOut { from { opacity:1; transform:translateY(0) translateX(-50%); } to { opacity:0; transform:translateY(10px) translateX(-50%); } }
    </style>
</body>
</html>
